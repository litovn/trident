# In-process echo target — used for smoke runs and unit tests.
# Mirror of the v0.3 TargetProfile schema (see target_profile.example.yaml).
id: echo
name: "Echo target (in-process)"
base_url: "memory://echo"

# Echo can do chat + retrieval ingest (simulated) + expose a synthetic system prompt.
# It is NOT agentic and exposes no tools → APP-004/005/006/008 auto-skipped.
capabilities: [has_chat, has_retrieval, exposes_system_prompt]

surfaces:
  chat:             { method: POST, path: /echo }
  retrieval_ingest: { method: POST, path: /echo/ingest }

auth:
  type: none

defense_levels: [L0]

# The Echo adapter knows how to surface a planted canary when the prompt contains
# the word "leak" / "exfil" / "planted" — that lets `exfil_canary` fire end-to-end.
success_oracle:
  canary:
    prefix: TRIDENT
    plant_surface: chat
    data_classification: Confidential
  expected_model_set: [Echo]

egress: local-only
notes: "In-process echo adapter used for smoke and unit tests."
