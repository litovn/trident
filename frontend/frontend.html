  .brand{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:60px;letter-spacing:.5px;color:#fff;line-height:1;text-transform:none;text-shadow:0 0 1px #000,0 0 4px rgba(0,0,0,.85),0 0 18px rgba(225,30,40,.4)}
  :root{
    --font:"universalSans",Inter,Roboto,"Open Sans",Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#0c0c0e; --fg:#f4f4f5; --secondary:#a7a7ad; --muted:#76767d;
    --surface-1:#1a1a1d; --surface-2:#212125; --surface-3:#2a2a2f;
    --border:rgba(255,255,255,.10); --hover:rgba(255,255,255,.06); --active:rgba(255,255,255,.10);
    --sidebar-bg:#0f0f11; --ring:inset 0 0 0 1px rgba(255,255,255,.08), 0 1px 2px rgba(0,0,0,.4);
    --btn-black:#fff; --btn-black-fg:#0c0c0e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;left:58%;top:40%;width:1100px;height:760px;transform:translate(-50%,-50%);
    background:radial-gradient(ellipse at center, rgba(255,42,42,.30), rgba(225,30,40,.12) 42%, transparent 70%);
    filter:blur(60px);pointer-events:none;z-index:-1;animation:glowpulse 6.5s ease-in-out infinite}
  .main{position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  svg{display:block}

  /* ===== SIDEBAR ===== */
  .sidebar{width:256px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;
    transition:width .2s cubic-bezier(.4,0,.2,1);overflow:hidden;border-right:1px solid var(--border)}
  body.collapsed .sidebar{width:60px}
  .sb-head{display:flex;align-items:center;height:56px;padding:0 12px;gap:6px}
  .sb-mark{width:30px;height:30px;display:grid;place-items:center;color:var(--fg);flex-shrink:0;border-radius:8px}
  .sb-mark:hover{background:var(--hover)}
  .sb-collapse{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--fg)}
  .sb-collapse:hover{background:var(--hover);color:var(--fg)}

  .sb-actions{padding:4px 8px;display:flex;flex-direction:column;gap:2px}
  .sb-btn{display:flex;align-items:center;gap:12px;height:40px;padding:0 12px;border-radius:10px;color:var(--fg);font-size:14px;font-weight:500;white-space:nowrap;width:100%;text-align:left}
  .sb-btn .ic{width:20px;height:20px;flex-shrink:0;display:grid;place-items:center;color:var(--secondary)}
  .sb-btn:hover{background:var(--hover)}
  body.collapsed .sb-btn .tx{display:none}
  body.collapsed .sb-btn{justify-content:center;padding:0}

  .sb-search{margin:4px 8px 2px;display:flex;align-items:center;gap:10px;height:40px;padding:0 12px;border-radius:10px;background:var(--surface-2)}
  .sb-search input{background:none;border:none;outline:none;color:var(--fg);font-size:14px;width:100%}
  .sb-search input::placeholder{color:var(--muted)}
  body.collapsed .sb-search{display:none}

  .history{flex:1;overflow-y:auto;padding:8px;margin-top:4px}
  .history::-webkit-scrollbar{width:8px}.history::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  .history::-webkit-scrollbar-track{background:transparent}
  body.collapsed .history{display:none}
  .grp-label{font-size:12px;font-weight:600;color:var(--muted);padding:12px 12px 4px}
  .chat-item{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px 0 12px;border-radius:9px;font-size:14px;color:var(--fg);white-space:nowrap;overflow:hidden;cursor:pointer}
  .chat-item .t{flex:1;overflow:hidden;text-overflow:ellipsis}
  .chat-item:hover{background:var(--hover)}
  .chat-item.active{background:var(--active)}
  .chat-item .del{opacity:0;width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--muted);flex-shrink:0}
  .chat-item:hover .del{opacity:1}
  .chat-item .del:hover{background:var(--surface-3);color:var(--fg)}

  .sb-foot{padding:8px;border-top:1px solid var(--border)}
  .sb-btn.danger .ic{color:#e0484f}
  .sb-btn.danger:hover{background:rgba(225,29,42,.10)}
  .sb-btn.danger:hover .tx{color:#ff6168}
  .acct{display:flex;align-items:center;gap:10px;height:48px;padding:0 8px;border-radius:10px;width:100%}
  .acct:hover{background:var(--hover)}
  .acct .av{width:30px;height:30px;border-radius:50%;background:var(--btn-black);color:var(--btn-black-fg);display:grid;place-items:center;font-size:13px;font-weight:700;flex-shrink:0}
  .acct .nm{display:flex;flex-direction:column;line-height:1.2;text-align:left;overflow:hidden}
  .acct .nm b{font-size:13.5px;font-weight:600;white-space:nowrap}
  .acct .nm span{font-size:12px;color:var(--muted);white-space:nowrap}
  body.collapsed .acct .nm{display:none}
  body.collapsed .acct{justify-content:center;padding:0}

  /* ===== MAIN ===== */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .topbar{height:56px;display:flex;align-items:center;padding:0 16px;gap:6px}
  .spacer{flex:1}
  .top-link{display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;border-radius:10px;font-size:14px;font-weight:600;color:var(--fg)}
  .top-link:hover{background:var(--hover)}
  .icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--fg)}
  .icon-btn:hover{background:var(--hover)}
  .pill{height:38px;padding:0 18px;border-radius:999px;font-size:14px;font-weight:600;display:flex;align-items:center}
  .pill.ghost{border:1px solid var(--border)}.pill.ghost:hover{background:var(--hover)}
  .pill.solid{background:var(--btn-black);color:var(--btn-black-fg)}.pill.solid:hover{opacity:.88}

  .stage{flex:1;display:flex;flex-direction:column;overflow:hidden;justify-content:center;position:relative}
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:8px 24px 6px}
  .hero.hidden{display:none}
  .hero .logo{display:flex;align-items:center;gap:16px;color:var(--fg)}
  .hero .logo img{filter:drop-shadow(0 0 1px rgba(0,0,0,.95)) drop-shadow(0 0 9px rgba(0,0,0,.6))}

  /* Microsoft squares impaled by the trident (boot) */
  .ms-tear{position:relative;display:flex;flex-direction:column;align-items:center;gap:22px;margin:0 auto 30px}
  .logobox{position:relative;width:150px;height:150px}
  .ms-tear .half{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

  .ms-word-below{font-family:'Segoe UI',system-ui,sans-serif;font-weight:600;font-size:40px;line-height:1;color:#e11d2a;letter-spacing:1px;text-shadow:0 0 24px rgba(225,29,42,.5),0 0 2px rgba(0,0,0,.6)}
  .ms-tear.rip .ms-word-below{animation:wordOut .8s ease forwards}
  @keyframes wordOut{0%{opacity:1}25%{opacity:1;letter-spacing:5px;color:#ff5258}100%{opacity:0;transform:translateY(10px)}}
  .rip-flash{position:absolute;left:0;right:0;top:50%;height:2px;transform:translateY(-50%);background:#ff7b80;box-shadow:0 0 26px 7px rgba(255,82,88,.85);opacity:0}
  .ms-tear .half{animation:msAppear .55s ease both}
  @keyframes msAppear{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:none}}
  .ms-tear.rip .half.top{animation:ripTop 1.1s cubic-bezier(.35,.05,.2,1) forwards}
  .ms-tear.rip .half.bot{animation:ripBot 1.1s cubic-bezier(.35,.05,.2,1) forwards}
  .ms-tear.rip .rip-flash{animation:ripFlash 1.1s ease forwards}
  @keyframes ripTop{0%,16%{transform:none;opacity:1}24%{transform:translate(-5px,-3px)}100%{transform:translate(-40px,-150px) rotate(-7deg);opacity:0}}
  @keyframes ripBot{0%,16%{transform:none;opacity:1}24%{transform:translate(5px,3px)}100%{transform:translate(40px,160px) rotate(7deg);opacity:0}}
  @keyframes ripFlash{0%,14%{opacity:0}20%{opacity:1}40%{opacity:.4}100%{opacity:0}}
  /* trident spear (upright) impaling the squares */
  .trident-spear{position:absolute;left:50%;top:-150%;width:104px;height:auto;transform:translateX(-50%);
    filter:drop-shadow(0 0 12px rgba(225,29,42,.8));opacity:0;z-index:6}
  .ms-tear.stab .trident-spear{animation:spear .40s cubic-bezier(.7,0,.85,.3) forwards}
  @keyframes spear{0%{top:-170%;opacity:0;transform:translateX(-50%) scale(1.08)}14%{opacity:1}74%{top:-34%;opacity:1;transform:translateX(-50%) scale(1)}100%{top:-28%;opacity:1;transform:translateX(-50%) scale(1)}}
  .ms-tear.rip .trident-spear{animation:spearStay .85s ease forwards}
  @keyframes spearStay{0%{top:-28%;opacity:1;transform:translateX(-50%)}65%{opacity:1}100%{top:-22%;opacity:0;transform:translateX(-50%) scale(.92)}}
  .impact{position:absolute;left:50%;top:50%;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%) scale(0);

  @keyframes impact{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}60%{opacity:.9}100%{opacity:0;transform:translate(-50%,-50%) scale(16)}}
  /* the rip only starts after the spear lands */
  .ms-tear.rip .half.top{animation:ripTop 1.25s cubic-bezier(.35,.05,.2,1) forwards}

</style>

  function renderAll(){renderHistory($("#searchInput").value);renderMessages();}

  function reply(t){const r=["This is a faithful snapshot of the UI: the sidebar and chat area work locally, with no backend.","Got it: «"+t+"». In a live version the assistant would generate the answer here via its APIs.","The sidebar is fully working: new chat, search, history by date, selection, deletion and collapse."];return r[Math.floor(Math.random()*r.length)];}

  async function send(){
    const t=input.value.trim();if(!t)return;
    // Mid-planning clarify: route this message as the answer; stay in the planning chat.
    if((window.__TMODE||"attack")!=='recon'&&window.__TRIDENT_planAwaiting&&window.__TRIDENT_planAwaiting()){
      input.value="";grow();sendBtn.disabled=true;
      if(window.__TRIDENT_planAnswer)window.__TRIDENT_planAnswer(t);
      return;
    }
    let c=active();
    if(!c){c={id:uid(),title:"New chat",messages:[],ts:Date.now()};state.chats.unshift(c);state.activeId=c.id;}
    if(!c.messages.length)c.title=t.slice(0,42);
    c.messages.push({role:"user",text:t});c.ts=Date.now();
    c.mode=window.__TMODE||"attack";
    input.value="";grow();sendBtn.disabled=true;save();renderAll();

      // Recon: pull the REAL recon trace + target profile from the backend (demo fallback).
      var real=null;
      if(window.__TRIDENT_fetchTrace){try{real=await window.__TRIDENT_fetchTrace(t,'recon',null);}catch(e){}}

      if(window.TRIDENT_recon)window.TRIDENT_recon(t,tr,!!real);
      c.verdict=window.__TVC||null;save();renderHistory($("#searchInput").value);

      // Attack: the real trace is fetched after the operator confirms a package,
      // inside TRIDENT_launch's planning callback. Seed with a demo marker for now.
      var tr2=(window.TRIDENT&&window.TRIDENT.currentTrace)?window.TRIDENT.currentTrace():"__DEMO__";
      if(window.TRIDENT_launch)window.TRIDENT_launch(t,tr2);
    }
  }

    if(!document.body.classList.contains("chat-on"))return;

      if(m!=='recon'&&m!=='attack')m='attack';

    let pi=0,ci=0,del=false;
    function tick(){
      // Pause the placeholder typewriter while the planning advisor awaits an answer,
      // so the "Answer to scope your campaign…" hint stays put.
      if(input.value||(window.__TRIDENT_planAwaiting&&window.__TRIDENT_planAwaiting())){return setTimeout(tick,800);}
      const cur=ph[pi];
      ci+=del?-1:1;
      input.setAttribute("placeholder",cur.slice(0,ci)+"\u258a");
      if(!del&&ci===cur.length){del=true;return setTimeout(tick,1500);}
      if(del&&ci===0){del=false;pi=(pi+1)%ph.length;}
      setTimeout(tick,del?35:65);
    }
    tick();
  })();
  window.__TRIDENT_refreshChat=renderAll;

})();

<script>
(function(){
  // ---- matrix rain (subtle, crimson) ----
  var cv=document.getElementById('matrix'),cx=cv.getContext('2d'),cols,drops,fs=15;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;cols=Math.ceil(cv.width/fs);drops=new Array(cols).fill(0).map(function(){return Math.random()*cv.height/fs;});}
  resize();window.addEventListener('resize',resize);
  var chars="01001011ABCDEF<>/\\#$%&*+=ｱｲｳｴｵｶｷｸｹｺ日二三四五".split("");
  function draw(){
    cx.fillStyle="rgba(8,8,10,0.09)";cx.fillRect(0,0,cv.width,cv.height);
    cx.font=fs+"px ui-monospace,Consolas,monospace";
    for(var i=0;i<cols;i++){
      var t=chars[Math.floor(Math.random()*chars.length)];
      var x=i*fs,y=drops[i]*fs;
      cx.fillStyle=(Math.random()>0.97)?"rgba(255,120,120,0.9)":"rgba(220,38,46,0.7)";
      cx.fillText(t,x,y);
      if(y>cv.height&&Math.random()>0.975)drops[i]=0;
      drops[i]+=0.55;
    }
  }
  setInterval(draw,55);

})();
</script>

  function compute(techs){

    var executed=all.filter(function(t){return t.state!=='blocked';});
    var failed=executed.filter(function(t){return t.state==='failed';});
    var succeeded=executed.filter(function(t){return t.state!=='failed';});
    var asr=executed.length?Math.round(succeeded.length/executed.length*100):0;
    var confirmed=executed.filter(function(t){return t.state==='confirmed';}).length;
    var criticals=succeeded.filter(function(t){return t.sev==='crit';}).length;
    var layers=LAYERS.map(function(L){
      var ex=executed.filter(function(t){return t.layer===L.k;});
      var ok=ex.filter(function(t){return t.state!=='failed';});
      return {k:L.k,n:L.n,c:L.c,fired:ex.length,ok:ok.length,
        oracle:ex.filter(function(t){return t.state==='confirmed';}).length,
        pct:ex.length?Math.round(ok.length/ex.length*100):0};
    }).filter(function(L){return L.fired>0;});
    var sev={};SEV.forEach(function(s){sev[s.k]=0;});
    succeeded.forEach(function(t){if(sev[t.sev]!=null)sev[t.sev]++;});

        if(d.allow===false){blocked[tid]=true;}

      }
      if(r.kind==='exec'&&tid){
        attempts++;

        var md=res.metadata||{};
        if(md.target)target=md.target;
        if(!byTech[tid]){byTech[tid]={id:tid,attempts:[],layer:r.layer};order.push(tid);}
        byTech[tid].attempts.push(res);

    });
    var techniques=order.map(function(tid){
      var T=byTech[tid], meta=CATALOG[tid]||{n:tid,layer:T.layer,owasp:"",atlas:"",sev:"info",ctrl:[]};
      var succeeded=T.attempts.some(function(a){return a.success===true;});
      var anyConf=T.attempts.some(function(a){return a.verdict==='confirmed';});
      var state=blocked[tid]?'blocked':(succeeded?(anyConf?'confirmed':'success'):'failed');

      var pick=T.attempts.filter(function(a){return a.success===true;})[0]||T.attempts[T.attempts.length-1]||{};
      var note=(pick.evidence||pick.response||'').replace(/\s+/g,' ').slice(0,180);
      var sevRaw=(pick.severity&&SEVMAP[pick.severity])||meta.sev||'info';
      var scorer=(pick.metadata&&pick.metadata.scorer)||'';
      var obj=(pick.metadata&&pick.metadata.objective_resolved)||'';

  var DEMO_TRACE=DEMO_TRACES[0]; var DEMO_I=0;
  var DEMO_FILTERED=false;
  function ensureDemoClean(){
    if(DEMO_FILTERED)return; DEMO_FILTERED=true;
    var keep=[];
    for(var i=0;i<DEMO_TRACES.length;i++){
      try{var rr=buildReport(DEMO_TRACES[i]),mm=compute(rr.techniques||[]);
        if(mm.criticals>0||mm.okN>0)keep.push(DEMO_TRACES[i]);}catch(e){keep.push(DEMO_TRACES[i]);}
    }
    if(keep.length){DEMO_TRACES=keep;DEMO_TRACE=DEMO_TRACES[0];}
  }
  var ACTIVE_TRACE=null;
  var R=null, M=null;
  var fact=function(k){var f=(R.facts||[]).filter(function(x){return x.k===k;})[0];return f?f.v:"";};

  function topbar(title,opts,leftNav){
    return '<div class="db-top"><div class="lg"><img src="'+MARK+'"><b>Trident</b></div>'+
      '<span class="tag">'+title+'</span><span class="rid">'+(R.meta&&R.meta.runId||'')+'</span>'+
      (leftNav?'<div class="db-nav">'+leftNav+'</div>':'')+
      '<span class="sp"></span><div class="db-acts">'+opts+'</div></div>';
  }

  // ---------- EXECUTIVE EXPORT (manager-friendly, print to PDF) ----------
  function xrStrip(s){return String(s==null?'':s).replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();}

  function xrDonut(pct,color){
    var p=Math.max(0,Math.min(100,pct||0)),r=52,C=2*Math.PI*r,off=C*(1-p/100);
    return '<svg viewBox="0 0 150 150" width="150" height="150" style="margin:0 auto" role="img" aria-label="Attack success rate '+p+' percent">'+
      '<circle cx="75" cy="75" r="52" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="16"/>'+
      '<circle cx="75" cy="75" r="52" fill="none" stroke="'+color+'" stroke-width="16" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 75 75)"/>'+
      '<text x="75" y="72" text-anchor="middle" font-size="30" font-weight="700" fill="#15151a">'+p+'%</text>'+
      '<text x="75" y="92" text-anchor="middle" font-size="11" fill="#6b6b73">success</text></svg>';
  }
  function xrSevBars(){
    var max=Math.max(1,SEV.reduce(function(m,s){return Math.max(m,M.sev[s.k]||0);},0));
    var W=340,H=160,n=SEV.length,bw=34,gap=(W-n*bw)/(n+1),base=H-26;
    var bars=SEV.map(function(s,i){
      var val=M.sev[s.k]||0,h=Math.round(val/max*(base-16)),x=gap+i*(bw+gap),y=base-h;
      return '<rect x="'+x.toFixed(1)+'" y="'+y+'" width="'+bw+'" height="'+Math.max(h,1)+'" rx="3" fill="'+s.c+'"/>'+
        '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-6)+'" text-anchor="middle" font-size="12" font-weight="700" fill="#15151a">'+val+'</text>'+
        '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(base+16)+'" text-anchor="middle" font-size="10" fill="#6b6b73">'+s.l+'</text>';
    }).join('');
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="160"><line x1="0" y1="'+base+'" x2="'+W+'" y2="'+base+'" stroke="rgba(0,0,0,.14)"/>'+bars+'</svg>';
  }
  function xrLayerBars(){
    if(!M.layers.length)return '<div class="xr-note">No layer activity recorded.</div>';
    var W=360,rowH=32,H=M.layers.length*rowH+6,labelW=96,barMax=W-labelW-46;
    var rows=M.layers.map(function(l,i){
      var y=i*rowH+6,w=Math.round((l.pct||0)/100*barMax);
      return '<text x="0" y="'+(y+15)+'" font-size="12.5" fill="#15151a" font-weight="600">'+l.n+'</text>'+
        '<rect x="'+labelW+'" y="'+(y+4)+'" width="'+barMax+'" height="14" rx="7" fill="rgba(0,0,0,.1)"/>'+
        '<rect x="'+labelW+'" y="'+(y+4)+'" width="'+Math.max(w,0)+'" height="14" rx="7" fill="'+l.c+'"/>'+
        '<text x="'+(labelW+barMax+6)+'" y="'+(y+15)+'" font-size="12" font-weight="700" fill="'+l.c+'">'+(l.pct||0)+'%</text>';
    }).join('');
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">'+rows+'</svg>';
  }

  function xrLayerDonut(){
    var data=M.layers.map(function(l){return {n:l.n,c:l.c,v:l.fired};}).filter(function(d){return d.v>0;});
    var total=data.reduce(function(a,d){return a+d.v;},0);
    if(!total){return '<div class="xr-note">No techniques recorded.</div>';}
    var r=54,C=2*Math.PI*r,acc=0;
    var segs=data.map(function(d){
      var len=C*(d.v/total),off=-acc;acc+=len;
      return '<circle cx="75" cy="75" r="'+r+'" fill="none" stroke="'+d.c+'" stroke-width="20" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+off.toFixed(2)+'" transform="rotate(-90 75 75)"/>';
    }).join('');
    var svg='<svg viewBox="0 0 150 150" width="140" height="140">'+segs+
      '<text x="75" y="70" text-anchor="middle" font-size="26" font-weight="800" fill="#15151a">'+total+'</text>'+
      '<text x="75" y="88" text-anchor="middle" font-size="10" fill="#6b6b73">techniques</text></svg>';
    var legend=data.map(function(d){var p=Math.round(d.v/total*100);
      return '<div class="xr-leg"><span class="xr-dot" style="background:'+d.c+'"></span><b>'+esc2(d.n)+'</b><span class="xr-legv">'+d.v+' \u00b7 '+p+'%</span></div>';}).join('');
    return '<div class="xr-donutwrap">'+svg+'<div class="xr-leglist">'+legend+'</div></div>';
  }

  function xrHeatmap(){
    var sevOrder=['info','low','med','high','crit'], stOrder=['blocked','failed','assessed','success','confirmed'];
    var grid={};
    (R.techniques||[]).forEach(function(t){
      var si=sevOrder.indexOf(t.sev),ki=stOrder.indexOf(t.state);
      if(si<0||ki<0)return;var key=si+'-'+ki;grid[key]=(grid[key]||0)+1;
    });
    function rc(score){if(score>=7)return '#e0484f';if(score>=5)return '#e07a3f';if(score>=3)return '#d9b13f';if(score>=1)return '#7faf5f';return '#5fae8a';}
    var cell=46,padL=58,padT=6,padB=54,padR=6,W=padL+5*cell+padR,H=padT+5*cell+padB,cells='';
    for(var row=0;row<5;row++){for(var ki=0;ki<5;ki++){
      var si=4-row,x=padL+ki*cell,y=padT+row*cell,n=grid[si+'-'+ki]||0,base=rc(si+ki);
      cells+='<rect x="'+x+'" y="'+y+'" width="'+(cell-4)+'" height="'+(cell-4)+'" rx="5" fill="'+base+'" fill-opacity="'+(n>0?1:0.13)+'"/>';
      if(n>0)cells+='<text x="'+(x+(cell-4)/2)+'" y="'+(y+(cell-4)/2+5)+'" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">'+n+'</text>';
    }}
    var yl=['Crit','High','Med','Low','Info'],xl=['Blocked','Failed','Assessed','Succeeded','Confirmed'];
    var ylab=yl.map(function(l,i){return '<text x="'+(padL-8)+'" y="'+(padT+i*cell+cell/2)+'" text-anchor="end" font-size="11" fill="#6b6b73">'+l+'</text>';}).join('');
    var xlab=xl.map(function(l,i){return '<text x="'+(padL+i*cell+(cell-4)/2)+'" y="'+(padT+5*cell+16)+'" text-anchor="middle" font-size="9" fill="#6b6b73">'+l+'</text>';}).join('');
    var axis='<text x="'+(padL+5*cell/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6b73">Likelihood / confidence \u2192</text>'+
      '<text transform="rotate(-90 12 '+(padT+5*cell/2)+')" x="12" y="'+(padT+5*cell/2)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6b73">Impact \u2192</text>';
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:'+W+'px;height:auto;display:block;margin:0 auto">'+cells+ylab+xlab+axis+'</svg>';
  }

  function xrStackBar(items){
    var total=items.reduce(function(a,d){return a+d.v;},0)||1,W=360,bx=0;
    var segs=items.map(function(d){var w=d.v/total*W;var r=w>0?'<rect x="'+bx.toFixed(1)+'" y="0" width="'+w.toFixed(1)+'" height="20" fill="'+d.c+'"/>':'';bx+=w;return r;}).join('');
    var legend=items.map(function(d){return '<span class="xr-leg"><span class="xr-dot" style="background:'+d.c+'"></span>'+esc2(d.label)+' <b>'+d.v+'</b></span>';}).join('');
    return '<svg viewBox="0 0 '+W+' 20" width="100%" height="20" preserveAspectRatio="none" style="border-radius:6px;overflow:hidden;display:block">'+segs+'</svg>'+
      '<div class="xr-legrow">'+legend+'</div>';
  }
  function xrCoverageCard(){
    var cov=R.coverage||[],c={covered:0,partial:0,out:0};
    cov.forEach(function(o){if(c[o.status]!=null)c[o.status]++;});
    return '<div class="xr-chartbox"><div class="ct">OWASP GenAI coverage</div>'+
      '<div class="xr-big">'+c.covered+'<span>/'+(cov.length||10)+' covered</span></div>'+
      xrStackBar([{label:'Covered',c:'#3f9e6b',v:c.covered},{label:'Partial',c:'#d9b13f',v:c.partial},{label:'Out of scope',c:'#9a9aa3',v:c.out}])+'</div>';
  }
  function xrRemCard(){
    var rows=(R.fixes&&R.fixes.rows)||[],p1=0,p2=0;

    return '<div class="xr-chartbox"><div class="ct">Recommended mitigations</div>'+
      '<div class="xr-big">'+rows.length+'<span> fixes</span></div>'+
      xrStackBar([{label:'P1 \u00b7 now',c:'#e0484f',v:p1},{label:'P2 \u00b7 next',c:'#d99a55',v:p2}])+'</div>';
  }

  function buildExport(){

            '<div class="xr-fid">'+esc2(meta)+'</div>'+
            (t.note?'<div class="xr-note">'+esc2(xrStrip(t.note))+'</div>':'')+'</td>'+
            '<td class="xr-stat" style="color:#8d98a6;font-weight:700">Mapped</td></tr>';}).join('')+'</tbody></table>'
      : '<div class="xr-sint">No reconnaissance steps were recorded for this run.</div>';

    var techHtml=LAYERS.map(function(L){
      var rows=(R.techniques||[]).filter(function(t){return t.layer===L.k;});

      var body=rows.map(function(t){
        var s=sevMeta[t.sev]||sevMeta.info;
        var stc=t.state==='confirmed'?'#3f9e6b':(t.state==='success'?'#d99a55':(t.state==='failed'?'#9a9aa3':(t.state==='blocked'?'#5fb0c4':'#8d98a6')));
        var tags=[t.owasp,t.atlas].filter(Boolean).join(' \u00b7 ');
        return '<tr><td><span class="xr-chip" style="background:'+s.c+'1f;color:'+s.c+';border-color:'+s.c+'66">'+s.l+'</span></td>'+
          '<td><div class="xr-fname">'+esc2(t.what)+'</div><div class="xr-fid">'+esc2(t.id)+(tags?' \u00b7 '+esc2(tags):'')+'</div></td>'+
          '<td class="xr-stat" style="color:'+stc+';font-weight:700;text-transform:capitalize">'+esc2(t.state)+'</td></tr>';

      return '<div class="xr-tgroup"><div class="xr-tglabel"><span class="xr-dot" style="background:'+L.c+'"></span>'+esc2(L.n)+' layer</div>'+

    var evHtml=(R.evidence||[]).map(function(e){

      if(e.response)conv+='<div class="xr-evrow"><span class="xr-evtag bot">Target</span><span>'+esc2(xrStrip(e.response))+'</span></div>';
      return '<div class="xr-ev"><div class="xr-evh"><span class="xr-fid">'+esc2(e.id)+'</span> '+esc2(e.what)+
        ' <b style="color:#3f9e6b;font-size:11px">'+(e.state==='confirmed'?'\u2713 confirmed':esc2(e.state||''))+'</b></div>'+
        conv+(e.evidence?'<div class="xr-evcap">'+esc2(xrStrip(e.evidence))+'</div>':'')+'</div>';

    var evidenceHtml=evHtml||'<div class="xr-sint">No captured exchanges available for this run.</div>';

      '<div class="xr-facts">'+facts+'</div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">04</span>Mitigations</div>'+

        '<div class="xr-remwrap">'+xrRemCard()+'</div></div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">05</span>Reconnaissance: what we learned</div>'+
        '<p class="xr-sint">Before attacking, the agents mapped the target. These steps gather information and are not attacks themselves.</p>'+reconHtml+'</div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">06</span>Key findings</div>'+
        '<p class="xr-sint">Weaknesses that the attackers successfully exploited, ordered by severity.</p>'+findTable+'</div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">07</span>Every technique we ran</div>'+
        '<p class="xr-sint">The full catalogue executed in this run, grouped by layer, with each outcome stated honestly.</p>'+techHtml+'</div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">08</span>Evidence: the proof</div>'+
        '<p class="xr-sint">Captured exchanges behind the confirmed findings. Every leaked value is synthetic.</p>'+evidenceHtml+'</div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">09</span>How the attack unfolded</div>'+
        '<p class="xr-sint">Each step is minor on its own; read in order, they form one complete breach.</p>'+chainHtml+'</div>'+

      '<div class="xr-section"><div class="xr-sh"><span class="xr-num">10</span>What to fix first</div>'+
        '<p class="xr-sint">'+esc2((R.fixes&&R.fixes.intro)||'Prioritised actions. P1 breaks the attack chain, P2 closes remaining gaps.')+'</p>'+fixesHtml+
        (lvHtml?'<div class="xr-subh">'+esc2((lv&&lv.title)||'Then prove the fixes work')+'</div><p class="xr-sint">'+esc2((lv&&lv.intro)||'')+'</p><div class="xr-levels">'+lvHtml+'</div>':'')+'</div>'+

      '<div class="xr-foot">Scored against MITRE ATLAS and the OWASP GenAI Top 10, with severity following the Microsoft MSRC AI bug bar. '+

        'Succeeded findings reflect an automated scorer\u2019s judgement.</div>'+
    '</div>';

    document.getElementById('exportReport').innerHTML=
      '<div class="xr-top"><div class="lg"><img src="'+MARK+'"><span>'+esc2(brand)+'</span></div>'+
      '<span class="xr-rid">'+esc2((R.meta&&R.meta.runId)||'')+'</span><span class="sp"></span>'+
      '<button class="xr-btn primary" id="xr-print">\u2913 Save as PDF</button>'+
      '<button class="xr-btn white" id="xr-close">Close</button></div>'+page;

    document.getElementById('xr-close').onclick=function(){hide('exportReport');};
    document.getElementById('xr-print').onclick=function(){printExport();};
    document.getElementById('exportReport').scrollTop=0;
  }

      ['asr',M.asr+'%','attack success','#ff5258'],['fired',M.fired,'techniques fired','#f4f4f5'],

  // Compute the best column count for a given chain-flow element and apply it
  function reshapeFlow(flow){
    if(!flow)return;
    var n=flow.querySelectorAll('.cstep').length;if(!n)return;
    var w=flow.clientWidth||flow.offsetWidth||0;if(!w){requestAnimationFrame(function(){reshapeFlow(flow);});return;}
    var full=flow.classList.contains('cf-flow');
    var minW=full?280:132; // min comfortable width per tile
    var cols=Math.max(1,Math.min(n,Math.floor((w+8)/(minW+8))));
    // balance rows so the last row isn't left with a single orphan
    var rows=Math.ceil(n/cols);cols=Math.ceil(n/rows);
    flow.style.setProperty('--ccols',cols);
    flow.classList.toggle('single',cols>=n);
    flow.classList.toggle('compact',!full&&rows>=2);
    flow.classList.toggle('compact2',!full&&rows>=3);
  }
  // Dynamically reshape the dashboard kill-chain into the best grid for the current width / step count
  function reshapeChain(){
    var d=document.getElementById('dboard');if(!d)return;
    reshapeFlow(d.querySelector('.chain-flow'));
  }

  function animateDash(){
    var d=document.getElementById('dboard');
    var panels=d.querySelectorAll('.panel,.kpi');
    panels.forEach(function(p,i){p.style.transitionDelay=(i*60)+'ms';});
    requestAnimationFrame(function(){d.classList.add('show');});
    // gauge fill + radar sweep (one shot)
    var deg=M.asr/100*360, gv=document.getElementById('gv'), g=d.querySelector('.gauge'), sw=d.querySelector('.sweep');
    if(sw){sw.style.animation='sweep 1.3s cubic-bezier(.2,.7,.2,1) 1';}
    var t0=null,dur=1300;
    function step(ts){if(!t0)t0=ts;var p=Math.min(1,(ts-t0)/dur);var e=1-Math.pow(1-p,3);
      g.style.setProperty('--deg',(deg*e)+'deg');gv.textContent=Math.round(M.asr*e)+'%';
      if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
    setTimeout(function(){
      d.querySelectorAll('.lbar i').forEach(function(i){i.style.width=i.getAttribute('data-pct')+'%';});
      d.querySelectorAll('.sev .bar').forEach(function(b){b.style.height=b.getAttribute('data-h')+'%';});

    // kill chain: connector draw + traveling pulse + sequential node light-up
    reshapeChain();
    var flow=d.querySelector('.chain-flow'), pulse=d.querySelector('.chain-pulse'), steps=d.querySelectorAll('.cstep');
    if(pulse){pulse.style.display=(flow&&flow.classList.contains('single'))?'':'none';}
    if(pulse&&steps.length&&flow&&flow.classList.contains('single')){pulse.style.animation='travel '+(steps.length*0.34+0.4)+'s ease-in-out .5s 1';}
    steps.forEach(function(s,i){setTimeout(function(){s.classList.add('in');},500+i*340);});
    // OWASP heatmap reveal
    d.querySelectorAll('.cov').forEach(function(c,i){c.style.transitionDelay=(i*45)+'ms';setTimeout(function(){c.classList.add('in');},700);});
    // kpi count
    d.querySelectorAll('.kpi b').forEach(function(b){

      var s0=null;function cs(ts){if(!s0)s0=ts;var p=Math.min(1,(ts-s0)/1100);var e=1-Math.pow(1-p,3);
        b.textContent=Math.round(to*e)+suf;if(p<1)requestAnimationFrame(cs);}
      setTimeout(function(){requestAnimationFrame(cs);},250);
    });
  }

  function buildRecon(T,launched){
    R=buildReport(T);
    var P=RECON_PROFILE;
    // Override the hardcoded profile with the REAL target profile from the backend recon.
    var BR=window.__TRIDENT_lastResult;
    if(BR&&BR.target){
      var bt=BR.target;P=Object.assign({},RECON_PROFILE);
      if(bt.name)P.name=bt.name;

      if(bt.model)P.model=bt.model;
      if(bt.auth&&bt.auth.type)P.auth='type: '+bt.auth.type;
      if(bt.defense_levels&&bt.defense_levels.length)P.defense=bt.defense_levels[0]+' (baseline)';
      if(bt.egress)P.egress=bt.egress;
      if(bt.capabilities&&bt.capabilities.length)P.caps=bt.capabilities.slice();
      if(bt.capabilities_off&&bt.capabilities_off.length)P.capsOff=bt.capabilities_off.map(function(c){return c+' \u2715';});
      if(bt.surfaces){var fmts=function(s){return s?((s.method||'POST')+' '+(s.path||'')):'';};
        P.surfaces={chat:fmts(bt.surfaces.chat)||RECON_PROFILE.surfaces.chat,rag:fmts(bt.surfaces.retrieval_ingest)||RECON_PROFILE.surfaces.rag};}
      if(BR.skipped&&BR.skipped.length)P.skipped=BR.skipped.map(function(s){var c=CATALOG[s.id]||{n:s.id};
        return {id:s.id,n:c.n,need:(s.missing&&s.missing.join(', '))||s.reason};});
    }
    var LC={prompt:'#5fb0c4',application:'#9b8cbb',model:'#c2879f'};
    // After recon, recommend a curated attack package (same matcher the attack planner uses).
    var top;
    if(RECON_PLAN&&RECON_PLAN.length){top=RECON_PLAN.map(function(c){var bp=byId(c.id);return bp?{pkg:bp,sim:c.sim||'0.90'}:null;}).filter(Boolean);}
    if(!top||!top.length)top=matchPackagesTop(RECON_PROMPT,4);
    var pkg=top[0].pkg;
    var selIdx=0;
    // Split each package's techniques: capability-gated ones are auto-skipped on this target.
    var gate={};P.skipped.forEach(function(s){gate[s.id]=s.need;});
    function reconPlanRows(pp){
      var tr=pp.techniques.filter(function(id){return !gate[id];}).map(function(id){var c=CATALOG[id]||{n:id,layer:''};var ly=c.layer||'';
        return '<div class="rc-prow"><span class="lz" style="background:'+(LC[ly]||'#888888')+'22;color:'+(LC[ly]||'#9a9aa3')+'">'+(ly||'\u2013')+'</span><b>'+esc2(c.n)+'</b><span class="mid2">'+id+(c.owasp?' \u00b7 '+c.owasp:'')+'</span></div>';

        return '<div class="rc-prow skip"><span class="lz" style="background:#ffffff14;color:#9a9aa3">skipped</span><b>'+esc2(c.n)+'</b><span class="mid2">'+id+' \u00b7 needs '+gate[id]+'</span></div>';}).join('');
      return tr+sr;
    }
    function reconTagHtml(pp){
      var t=[];if(pp.limits){t.push(pkgCap(pp.limits.max_intensity)+' intensity');t.push(pp.limits.query_budget+' queries');}
      t.push(pp.techniques.length+' techniques');t.push(pp.axis+' package');
      return t.map(function(x){return '<span class="rc-opt-tag">'+esc2(x)+'</span>';}).join('');
    }
    var pkgOptsHtml=top.map(function(item,idx){
      var p=item.pkg,best=idx===0,oc=RECON_PALETTE[idx%RECON_PALETTE.length];
      return '<div class="rc-opt'+(best?' best':'')+'" style="--oc:'+oc.c+';--ocs:'+oc.s+';--ocm:'+oc.m+';--ocg:'+oc.g+'" data-idx="'+idx+'" data-name="'+esc2(p.name)+'">'+
        '<div class="rc-opt-head">'+
          '<div class="rc-opt-ic">'+(best?PKGICO:String(idx+1))+'</div>'+
          '<div class="rc-opt-main">'+
            '<div class="rc-opt-kick">'+esc2(p.id)+' \u00b7 '+esc2(p.axis)+(best?' <span class="rc-opt-badge">BEST MATCH</span>':'')+' <span class="rc-opt-sim">'+item.sim+' match</span></div>'+
            '<div class="rc-opt-name">'+esc2(p.name)+'</div>'+
            '<div class="rc-opt-desc">'+esc2(p.description)+'</div>'+
            '<div class="rc-opt-meta">'+reconTagHtml(p)+'</div>'+
          '</div>'+
          '<div class="rc-opt-check"></div>'+
        '</div>'+
        '<div class="rc-detail"><div class="rc-detail-in"><div class="rc-plan">'+reconPlanRows(p)+'</div></div></div>'+
        '<div class="rc-opt-acts"><button class="rc-mini" data-act="toggle">Techniques</button></div>'+
      '</div>';
    }).join('');
    var caps=P.caps.map(function(c){return '<span class="rc-chip">'+c+'</span>';}).join('')+P.capsOff.map(function(c){return '<span class="rc-chip off">'+c+'</span>';}).join('');
    var BRr=window.__TRIDENT_lastResult, _realRecon=BRr&&BRr.mode==='recon'&&R.techniques&&R.techniques.length;
    var findings;
    if(_realRecon){
      findings=R.techniques.map(function(t){
        var meta=[t.id,t.atlas,t.scorer].filter(Boolean).join(' \u00b7 ');
        var d=esc2(t.evid||t.note||t.resp||('verdict: '+t.state));
        return '<div class="rc-find"><span class="dot"></span><div><div class="ttl">'+esc2(t.what)+'<span class="mid">'+esc2(meta)+'</span></div><div class="dsc">'+d+'</div></div></div>';

        '. Here are the <b>'+list.length+'</b> best matches \u2014 review and pick one to launch.</span>');
      revealOptions(list);
    }

    window.__TRIDENT_planAwaiting=function(){return !!(PLAN&&PLAN.awaiting);};
    window.__TRIDENT_planAnswer=function(text){
      if(!PLAN)return;PLAN.awaiting=false;setHint(false);
      userSay(text);
      var ans=text;if((PLAN.clarifies||0)>=2)ans+='. That is enough detail; propose the best packages now, do not ask more questions.';
      PLAN.history.push({role:'user',content:ans});
      say('<span class="ac-think">Got it \u2014 refining the scope\u2026</span>');
      var resp=null,err=false;
      planCall().then(function(r){resp=r;},function(){err=true;}).then(function(){
        if(err)revealOptions(proposeLocal());else renderTurn(resp);
      });
    };

    function revealOptions(list){
      var box=botBubble();
      var wrap=document.createElement('div');wrap.className='ac-opts';
      var hd=document.createElement('div');hd.className='ac-opts-h';
      hd.textContent='Top '+list.length+' recommended packages \u00b7 pick one to launch';
      wrap.appendChild(hd);
      list.forEach(function(item,idx){
        var p=item.pkg,best=idx===0;
        var lset={};p.techniques.forEach(function(id){var c=CATALOG[id];if(c)lset[c.layer]=1;});
        var nL=Object.keys(lset).length;
        var tags=[];
        if(p.limits)tags.push(pkgCap(p.limits.max_intensity)+' intensity');
        tags.push(p.techniques.length+' techniques');
        tags.push(nL+' layer'+(nL===1?'':'s'));
        tags.push(p.axis+' package');
        var tagHtml=tags.map(function(t){return '<span class="op-tag">'+esc2(t)+'</span>';}).join('');
        var techRows=p.techniques.map(function(id){var c=CATALOG[id]||{n:id,layer:''};
          var ll={prompt:'PRM',application:'APP',model:'MOD'}[c.layer]||'\u2013';
          return '<div class="pk-tech"><span class="tl '+c.layer+'">'+ll+'</span>'+
            '<span class="tn">'+esc2(c.n)+(c.owasp?' <span style="color:#76767d;font-size:11px">\u00b7 '+esc2(c.owasp)+'</span>':'')+'</span>'+
            '<span class="tid">'+id+'</span></div>';
        }).join('');
        var card=document.createElement('div');card.className='ac-opt'+(best?' best':'');
        var oc=PKG_PALETTE[idx%PKG_PALETTE.length];
        card.style.setProperty('--oc',oc.c);card.style.setProperty('--ocs',oc.s);card.style.setProperty('--ocm',oc.m);card.style.setProperty('--ocg',oc.g);
        card.innerHTML=
          '<div class="op-head"><div class="op-rank">'+(best?PKGICO:String(idx+1))+'</div><div class="op-main">'+
            '<div class="op-kick">'+esc2(p.id)+' \u00b7 '+esc2(p.axis)+(best?' <span class="op-badge">BEST MATCH</span>':'')+' <span class="op-sim">'+item.sim+' match</span></div>'+
            '<div class="op-name">'+esc2(p.name)+'</div>'+
            '<div class="op-desc">'+esc2(item.rationale||p.description)+'</div>'+
            '<div class="op-meta">'+tagHtml+'</div></div></div>'+
          '<div class="pk-detail"><div class="pk-detail-in">'+techRows+'</div></div>'+
          '<div class="op-acts">'+
            '<button class="op-btn" data-act="toggle">Techniques</button>'+
            '<button class="op-btn'+(best?' primary':'')+'" data-act="go">'+(best?'Launch this package':'Run this package')+' '+ARROW+'</button>'+
          '</div>';
        var det=card.querySelector('.pk-detail'),tg=card.querySelector('[data-act="toggle"]');
        tg.onclick=function(){det.classList.toggle('open');
          tg.textContent=det.classList.contains('open')?'Hide':'Techniques';
          if(det.classList.contains('open')){var acts=card.querySelector('.op-acts');if(acts)setTimeout(function(){acts.scrollIntoView({block:'nearest',behavior:'smooth'});},480);}else{down();}};
        card.querySelector('[data-act="go"]').onclick=function(){document.body.classList.remove('pkg-open');PLAN=null;setHint(false);if(onSelect)onSelect(p);};
        card.addEventListener('click',function(){wrap.querySelectorAll('.ac-opt').forEach(function(x){x.classList.remove('sel');});card.classList.add('sel');});
        wrap.appendChild(card);
      });
      box.appendChild(wrap);down();
      document.body.classList.add('pkg-open');
    }
  }

  window.TRIDENT_launch=function(prompt,trace,instant,pkgTechs){
    var T;
    if(typeof trace==='string'&&/^__DEMO:(\d+)__$/.test(trace)){T=DEMO_TRACES[(+RegExp.$1)%DEMO_TRACES.length];}
    else if(trace==='__DEMO__'){T=DEMO_TRACES[0];}
    else{T=trace||ACTIVE_TRACE||DEMO_TRACE;}
    R=buildReport(T,pkgTechs); M=compute(R.techniques||[]); window.__TVC=R.verdictColor;
    var d=document.getElementById('dboard');
    if(instant){hide('remed');hide('scan');d.classList.remove('show');buildDash();show('dboard');requestAnimationFrame(animateDash);return;}
    // Planning agent: simulate research + recommend an attack package, then run on confirm.
    runAgentChat(prompt,function(selPkg){
      var capturePlan=function(){var plan='',rows=document.querySelectorAll('#messages .row.ac-plan');
        for(var pi=0;pi<rows.length;pi++)plan+=rows[pi].outerHTML;return plan;};
      var render=function(Tuse,scopeTechs,realTrace){
        // the chosen package scopes the report; the live backend trace is authoritative when present
        R=buildReport(Tuse,scopeTechs);M=compute(R.techniques||[]);window.__TVC=R.verdictColor;
        if(window.__TRIDENT_commitTrace)window.__TRIDENT_commitTrace(realTrace||trace,capturePlan());
        hide('scan');d.classList.remove('show');buildDash();show('dboard');animateDash();
      };
      // Confirmed package → run the REAL campaign for it on the backend (demo fallback).
      if(window.__TRIDENT_fetchTrace&&selPkg&&selPkg.id){
        window.__TRIDENT_fetchTrace(prompt,'attack',selPkg.id).then(function(res){
          if(res&&res.trace){ACTIVE_TRACE=res.trace;render(res.trace,null,res.trace);}
          else render(T,(selPkg&&selPkg.techniques)||null,null);
        });
      } else render(T,(selPkg&&selPkg.techniques)||null,null);
    });
  };
  if(window.__TRIDENT_refreshChat)window.__TRIDENT_refreshChat();
})();
</script>

<script>
/* ============================================================
   TRIDENT backend bridge — connects this UI to the offline engine
   (trident-main/src/web/server.py). When the backend is unreachable it
   transparently falls back to the embedded demo traces, so this file still
   works as a standalone static page.
   ============================================================ */
(function(){
  "use strict";
  // Same-origin when served by the bridge; otherwise (file://) hit the default port.
  var BASE=(location.protocol==='http:'||location.protocol==='https:')?'':'http://127.0.0.1:8765';
  function api(path,opts){return fetch(BASE+path,opts).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}

  window.TRIDENT_API={
    base:BASE,
    health:function(){return api('/api/health');},
    packages:function(){return api('/api/packages');},
    techniques:function(){return api('/api/techniques');},
    campaign:function(prompt,mode,pkgId){
      return api('/api/campaign',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:prompt||'',mode:mode||'attack',package:pkgId||null})});
    },
    plan:function(history,mode){
      return api('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({history:history||[],mode:mode||'attack'})});
    }
  };

  window.__TRIDENT_BACKEND=false;
  window.__TRIDENT_lastResult=null;

  // Run a REAL campaign on the backend and publish its trace via TRIDENT.setTrace.
  // Resolves to the campaign result, or null on any failure (caller uses demo data).
  window.__TRIDENT_fetchTrace=function(prompt,mode,pkgId){
    if(!window.__TRIDENT_BACKEND)return Promise.resolve(null);
    return window.TRIDENT_API.campaign(prompt,mode,pkgId).then(function(res){
      if(res&&res.trace){window.__TRIDENT_lastResult=res;if(window.TRIDENT&&window.TRIDENT.setTrace)window.TRIDENT.setTrace(res.trace);return res;}
      return null;
    }).catch(function(e){console.warn('[TRIDENT] backend campaign failed:',e);return null;});
  };

  // ---- backend status chip + connection popover (top-right of the topbar) ----
  var _connHealth=null,_connMs=null,_connChecked=null;
  var _connURL=(BASE||location.origin||'http://127.0.0.1:8765');

  var _cstyle=document.createElement('style');
  _cstyle.textContent=
    '#trident-conn-pop{position:fixed;z-index:10000;width:300px;max-width:calc(100vw - 24px);'+
      'background:rgba(20,20,24,.97);border:1px solid rgba(255,255,255,.12);border-radius:14px;'+
      'box-shadow:0 16px 44px rgba(0,0,0,.5);padding:14px;color:#cdd2da;'+
      'font:500 12.5px/1.45 var(--font,sans-serif);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}'+
    '#trident-conn-pop .cp-head{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:#fff;margin-bottom:11px}'+
    '#trident-conn-pop .cp-dot{width:9px;height:9px;border-radius:50%;flex:none}'+
    '#trident-conn-pop .cp-rows{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}'+
    '#trident-conn-pop .cp-row{display:flex;gap:10px;align-items:baseline}'+
    '#trident-conn-pop .cp-row>span{flex:none;width:86px;color:#8a8f99;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}'+
    '#trident-conn-pop .cp-row>b{flex:1;color:#e7eaf0;font-weight:600;word-break:break-word}'+
    '#trident-conn-pop .cp-chip{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);margin:0 4px 4px 0;color:#bfc5cf;font-family:ui-monospace,Consolas,monospace}'+
    '#trident-conn-pop .cp-on{color:#5fc08e}#trident-conn-pop .cp-off{color:#8a8f99}'+
    '#trident-conn-pop .cp-test{width:100%;height:34px;border:none;border-radius:9px;background:#e11d2a;color:#fff;font:700 12px/1 var(--font,sans-serif);text-transform:uppercase;letter-spacing:.05em;cursor:pointer}'+
    '#trident-conn-pop .cp-test:disabled{opacity:.6;cursor:default}'+
    '#trident-conn-pop .cp-checked{margin-top:8px;font-size:11px;color:#7d828c;text-align:center}'+
    '#trident-backend-badge{cursor:pointer}#trident-backend-badge:hover{border-color:rgba(255,255,255,.22)}';
  document.head.appendChild(_cstyle);

  var badge=document.createElement('button');
  badge.id='trident-backend-badge';badge.type='button';
  badge.style.cssText='display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;margin-left:6px;'+
    'border-radius:999px;font:600 11px/1 var(--font,sans-serif);letter-spacing:.04em;text-transform:uppercase;'+
    'color:var(--secondary,#a7a7ad);background:var(--surface-2,#212125);border:1px solid var(--border,rgba(255,255,255,.10));'+
    'white-space:nowrap;flex:none;transition:.2s';
  badge.innerHTML='<span id="tbb-dot" style="width:7px;height:7px;border-radius:50%;background:#caa53a;box-shadow:0 0 7px #caa53a;flex:none"></span>'+
    '<span id="tbb-txt">connecting\u2026</span>'+
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="opacity:.6"><path d="M6 9l6 6 6-6"/></svg>';
  var _topbar=document.querySelector('.main .topbar');
  if(_topbar)_topbar.appendChild(badge);else document.body.appendChild(badge);
  function setBadge(txt,color){var d=document.getElementById('tbb-dot'),t=document.getElementById('tbb-txt');
    if(d){d.style.background=color;d.style.boxShadow='0 0 7px '+color;}if(t)t.textContent=txt;}

  var pop=document.createElement('div');pop.id='trident-conn-pop';pop.style.display='none';
  pop.innerHTML=
    '<div class="cp-head"><span class="cp-dot" id="cp-dot"></span><span id="cp-title">Checking\u2026</span></div>'+
    '<div class="cp-rows">'+
      '<div class="cp-row"><span>URL</span><b id="cp-url"></b></div>'+
      '<div class="cp-row"><span>Engine</span><b id="cp-engine"></b></div>'+
      '<div class="cp-row"><span>Catalog</span><b id="cp-catalog"></b></div>'+
      '<div class="cp-row"><span>Target</span><b id="cp-target"></b></div>'+
      '<div class="cp-row"><span>Capabilities</span><b id="cp-caps"></b></div>'+
      '<div class="cp-row"><span>Endpoints</span><b id="cp-endpoints"></b></div>'+
      '<div class="cp-row"><span>Latency</span><b id="cp-latency"></b></div>'+
    '</div>'+
    '<button class="cp-test" id="cp-test">Test connection</button>'+
    '<div class="cp-checked" id="cp-checked"></div>';
  document.body.appendChild(pop);

  function _q(id){return document.getElementById(id);}
  function _cap(on){return on?'<span class="cp-on">on</span>':'<span class="cp-off">off</span>';}
  function renderPop(){
    var ok=window.__TRIDENT_BACKEND,h=_connHealth||{};
    _q('cp-dot').style.background=ok?'#5fc08e':'#c25a5a';
    _q('cp-dot').style.boxShadow='0 0 8px '+(ok?'#5fc08e':'#c25a5a');
    _q('cp-title').textContent=ok?'Connected':'Not connected';
    _q('cp-url').textContent=_connURL;
    _q('cp-engine').textContent=ok?(h.engine||'\u2014'):'\u2014';
    _q('cp-catalog').textContent=ok?((h.techniques||0)+' techniques \u00b7 '+(h.packages||0)+' packages'):'\u2014';
    _q('cp-target').textContent=ok?((h.targets&&h.targets.join(', '))||'aigoat'):'\u2014';
    _q('cp-caps').innerHTML=ok?('foundry '+_cap(h.foundry_configured)+' \u00b7 pyrit '+_cap(h.pyrit_installed)+' \u00b7 sdk '+_cap(h.sdk_installed)):'\u2014';
    _q('cp-endpoints').innerHTML=ok?['/api/health','/api/packages','/api/plan','/api/campaign'].map(function(e){return '<span class="cp-chip">'+e+'</span>';}).join(''):'\u2014';
    _q('cp-latency').textContent=(_connMs!=null)?(_connMs+' ms'):(ok?'\u2014':'unreachable');
    _q('cp-checked').textContent=_connChecked?('last checked '+_connChecked.toLocaleTimeString()):'';
  }
  function positionPop(){
    var r=badge.getBoundingClientRect();
    pop.style.top=(r.bottom+8)+'px';
    pop.style.right=Math.max(12,window.innerWidth-r.right)+'px';pop.style.left='auto';
  }
  function openPop(){renderPop();pop.style.display='block';positionPop();}
  function closePop(){pop.style.display='none';}
  badge.addEventListener('click',function(e){e.stopPropagation();if(pop.style.display==='none')openPop();else closePop();});
  document.addEventListener('click',function(e){if(pop.style.display==='block'&&!pop.contains(e.target)&&!badge.contains(e.target))closePop();});
  window.addEventListener('resize',function(){if(pop.style.display==='block')positionPop();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePop();});

  function checkConnection(){
    setBadge('checking\u2026','#caa53a');
    var t0=(window.performance&&performance.now)?performance.now():Date.now();
    return window.TRIDENT_API.health().then(function(h){
      _connMs=Math.round(((window.performance&&performance.now)?performance.now():Date.now())-t0);
      _connHealth=h;window.__TRIDENT_BACKEND=true;window.__TRIDENT_health=h;_connChecked=new Date();
      setBadge('Backend live \u00b7 '+h.techniques+' techniques','#3fae7a');
      renderPop();return true;
    }).catch(function(){
      _connMs=null;window.__TRIDENT_BACKEND=false;_connChecked=new Date();
      setBadge('Backend offline \u00b7 demo data','#c25a5a');
      renderPop();return false;
    });
  }
  _q('cp-test').addEventListener('click',function(){var b=this;b.disabled=true;b.textContent='Testing\u2026';
    checkConnection().then(function(){b.disabled=false;b.textContent='Test connection';});});

  checkConnection();
  if(window.TRIDENT_API.techniques)window.TRIDENT_API.techniques().then(function(d){
    if(window.__TRIDENT_applyTechniques)window.__TRIDENT_applyTechniques(d.techniques||d);
  }).catch(function(){});
  if(window.TRIDENT_API.packages)window.TRIDENT_API.packages().then(function(d){
    if(window.__TRIDENT_applyPackages)window.__TRIDENT_applyPackages(d.packages||d);
  }).catch(function(){});
})();
</script>

  .tt-cmd input{flex:1;min-width:0;height:36px;background:#141417;border:1px solid rgba(255,255,255,.10);border-radius:8px;color:#e7eaf0;
    padding:0 12px;font:13px/1 ui-monospace,Consolas,monospace;outline:none}
  .tt-cmd input:focus{border-color:rgba(225,29,42,.6)}
  .tt-cmd select{height:36px;background:#141417;border:1px solid rgba(255,255,255,.10);border-radius:8px;color:#cdd2da;padding:0 8px;outline:none}
  .tt-cmd .tt-run{height:36px;padding:0 18px;border-radius:8px;background:#e11d2a;color:#fff;font:700 12px/1 var(--font,sans-serif);
    text-transform:uppercase;letter-spacing:.05em}
  .tt-cmd .tt-run:disabled{opacity:.55;cursor:default}
  .tt-prog .tp-head{display:flex;align-items:center;gap:8px;font-size:14px}
  .tt-prog .tp-head b{font-weight:600}
  .tt-prog .tp-sub{color:var(--muted,#76767d);font-size:12px;margin-left:auto;white-space:nowrap}
  .tt-prog .tp-spin{width:13px;height:13px;flex:none;border-radius:50%;border:2px solid rgba(225,29,42,.3);border-top-color:#e11d2a;animation:tt-spin .8s linear infinite}
  .tt-prog .tp-done{color:#5fc08e;font-weight:800;flex:none}
  @keyframes tt-spin{to{transform:rotate(360deg)}}
  .tt-prog .tp-log{margin-top:9px;font:12px/1.55 ui-monospace,Consolas,monospace;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 10px;max-height:150px;overflow:hidden}
  .tt-prog .tp-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#c7ccd4}
  .tt-prog .tp-line.l-dispatch{color:#5fd0e6}.tt-prog .tp-line.l-judge{color:#d98cff}.tt-prog .tp-line.l-err{color:#ff6b6b}
  .tt-prog .tp-line.l-target{color:#e7c873}.tt-prog .tp-line.l-http{color:#7e8693}.tt-prog .tp-line.l-web{color:#6fcf8e}.tt-prog .tp-line.l-client{color:#7aa2ff}
</style>
<script id="trident-term-script">
(function(){
  "use strict";
  var BASE=(window.TRIDENT_API&&window.TRIDENT_API.base!=null)?window.TRIDENT_API.base
    :((location.protocol==='http:'||location.protocol==='https:')?'':'http://127.0.0.1:8765');

  // ---- mode toggle (injected into the topbar) ------------------------
  var bar=document.createElement('div');bar.className='tt-modebar';
  var bG=document.createElement('button');bG.type='button';bG.textContent='GUI';bG.className='on';
  var bT=document.createElement('button');bT.type='button';bT.textContent='Terminal';
  bar.appendChild(bG);bar.appendChild(bT);
  var tb=document.querySelector('.main .topbar');
  if(tb){tb.appendChild(bar);}else{bar.style.cssText+=';position:fixed;top:10px;right:140px;z-index:10001';document.body.appendChild(bar);}

  // ---- overlay -------------------------------------------------------
  var ov=document.createElement('div');ov.id='trident-term';
  ov.innerHTML=
    '<div class="tt-head">'+
      '<div class="tt-title"><span class="tt-sdot" id="tt-sdot"></span>TRIDENT &middot; live engine</div>'+
      '<div class="tt-layers">'+
        '<span class="tt-layer" data-layer="prompt">Prompt</span><span class="tt-arrow">&#9654;</span>'+
        '<span class="tt-layer" data-layer="application">Application</span><span class="tt-arrow">&#9654;</span>'+
        '<span class="tt-layer" data-layer="model">Model</span>'+
      '</div>'+
      '<div class="tt-spacer"></div>'+
      '<span class="tt-status" id="tt-status">connecting&hellip;</span>'+
      '<button class="tt-btn" type="button" id="tt-auto">Autoscroll: on</button>'+
      '<button class="tt-btn" type="button" id="tt-clear">Clear</button>'+
      '<button class="tt-btn tt-exit" type="button" id="tt-exit">Graphic view</button>'+
    '</div>'+
    '<div class="tt-console" id="tt-console"></div>'+
    '<div class="tt-cmd">'+
      '<span class="pfx">&rsaquo;</span>'+
      '<input id="tt-input" autocomplete="off" spellcheck="false" placeholder="campaign objective (e.g. test a jailbreak on the prompt layer) \u2014 Enter to plan" />'+
      '<select id="tt-mode"><option value="attack">attack</option><option value="recon">recon</option></select>'+
      '<button class="tt-run" type="button" id="tt-run">Plan</button>'+
    '</div>';
  document.body.appendChild(ov);

  var con=document.getElementById('tt-console');
  var statusEl=document.getElementById('tt-status');
  var sdot=document.getElementById('tt-sdot');
  var auto=true;

  function p2(n){return(n<10?'0':'')+n;}
  function fmtTs(ts){var d=new Date((ts||Date.now()/1000)*1000);return p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());}
  function shortLogger(lg){lg=lg||'';return lg
    .replace('src.orchestrator.','').replace('src.core.','').replace('src.skills.','')
    .replace('pyrit.prompt_target.openai.','pyrit/').replace('pyrit.prompt_converter.','conv/').replace('pyrit.','pyrit/');}
  function lineClass(it){var lg=it.logger||'',lv=it.level||'',m=it.msg||'';
    if(lv==='ERROR'||/content_filter|ResponsibleAI|BadRequest/i.test(m))return 'l-err';
    if(lv==='WARNING')return 'l-warn';
    if(lg.indexOf('src.orchestrator.dispatch')===0)return 'l-dispatch';
    if(lg.indexOf('trident.judge')===0)return 'l-judge';
    if(lg.indexOf('trident.web')===0)return 'l-web';
    if(lg.indexOf('src.core.client')===0||lg.indexOf('copilot')===0)return 'l-client';
    if(lg.indexOf('httpx')===0)return 'l-http';
    if(lg.indexOf('pyrit.prompt_target')===0)return 'l-target';
    if(lg.indexOf('pyrit.prompt_converter')===0)return 'l-conv';
    return 'l-default';}
  var layerT=null;
  function setLayer(l){var els=ov.querySelectorAll('.tt-layer');for(var i=0;i<els.length;i++){if(els[i].getAttribute('data-layer')===l)els[i].classList.add('on');}
    if(layerT)clearTimeout(layerT);layerT=setTimeout(function(){var e2=ov.querySelectorAll('.tt-layer');for(var j=0;j<e2.length;j++)e2[j].classList.remove('on');},9000);}
  function append(it,forceCls){
    var raw=String(it.msg==null?'':it.msg);var m=raw;
    if(m.length>1200)m=m.slice(0,1200)+' \u2026[+'+(raw.length-1200)+' chars]';
    var row=document.createElement('div');row.className='tt-row '+(forceCls||lineClass(it));
    var ts=document.createElement('span');ts.className='tt-ts';ts.textContent=fmtTs(it.ts);
    var tag=document.createElement('span');tag.className='tt-tag';tag.textContent=shortLogger(it.logger);
    var msg=document.createElement('span');msg.className='tt-msg';msg.textContent=m;
    row.appendChild(ts);row.appendChild(tag);row.appendChild(msg);con.appendChild(row);
    var mm=raw.match(/layer=([a-z]+)/);if(mm)setLayer(mm[1]);
    while(con.childNodes.length>2200)con.removeChild(con.firstChild);
    if(auto)con.scrollTop=con.scrollHeight;
  }
  function sys(t,cls){append({ts:Date.now()/1000,logger:'terminal',level:'INFO',msg:t},cls||'l-sys');}
  function setStatus(ok,txt){statusEl.textContent=txt;statusEl.style.color=ok?'#6fcf8e':'#c25a5a';
    sdot.style.background=ok?'#6fcf8e':'#caa53a';sdot.style.boxShadow='0 0 8px '+(ok?'#6fcf8e':'#caa53a');}

  // ---- shared live stream (one SSE feeding BOTH views) --------------
  // Connects eagerly on page load and fans every log line out to subscribers,
  // keeping a full in-memory history. The terminal console and the GUI progress
  // bubble both read from this, so a run is visible in either mode, no matter
  // which is on screen or when you switch to it.
  var STREAM=(function(){
    var subs=[],items=[],es=null,status='connecting';
    function emit(it){items.push(it);if(items.length>6000)items.shift();
      for(var i=0;i<subs.length;i++){try{subs[i](it);}catch(e){}}}
    var statusSubs=[];function fireStatus(){for(var i=0;i<statusSubs.length;i++){try{statusSubs[i](status);}catch(e){}}}
    function open(){
      if(es)return;
      if(typeof EventSource==='undefined'){status='error';fireStatus();return;}
      try{es=new EventSource(BASE+'/api/logstream');}catch(e){status='error';fireStatus();return;}
      es.onopen=function(){status='live';fireStatus();};
      es.onmessage=function(ev){try{emit(JSON.parse(ev.data));}catch(e){}};
      es.onerror=function(){status='reconnecting';fireStatus();};
    }
    open();
    return {subscribe:function(fn,replay){subs.push(fn);if(replay){for(var i=0;i<items.length;i++){try{fn(items[i]);}catch(e){}}}
        return function(){var k=subs.indexOf(fn);if(k>=0)subs.splice(k,1);};},
      onStatus:function(fn){statusSubs.push(fn);try{fn(status);}catch(e){}},items:function(){return items;}};
  })();
  // Terminal console renders every line live (full history accrues even while
  // hidden — open the terminal any time and the whole run is there).
  STREAM.subscribe(function(it){append(it);},false);
  STREAM.onStatus(function(s){setStatus(s==='live',
    s==='live'?'streaming live':(s==='reconnecting'?'reconnecting\u2026':(s==='error'?'no SSE support':'connecting\u2026')));});
  function connect(){}  // stream is eager now; kept as a no-op for callers
  window.__TRIDENT_STREAM=STREAM;

  // ---- structured result block --------------------------------------
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function renderResult(res){
    if(!res)return;var rep=res.report||{};var sc=rep.scorecards||[];var fnd=rep.findings||[];
    var html='<h4>&#9635; campaign report &middot; '+esc(res.engine||'?')+' engine</h4>';
    html+='<div><span class="k">package</span> <span class="v">'+esc((res.package&&res.package.id)||'\u2014')+(res.package&&res.package.name?' &middot; '+esc(res.package.name):'')+'</span></div>';
    html+='<div><span class="k">id</span> <span class="v">'+esc(res.campaign_id||'\u2014')+'</span> &nbsp; <span class="k">mode</span> <span class="v">'+esc(res.mode||'\u2014')+'</span></div>';
    if(sc.length){html+='<div style="margin-top:7px"><span class="k">layers</span></div>';
      sc.forEach(function(s){html+='<div class="v">&nbsp;&nbsp;'+esc(s.layer)+': fired '+((s.techniques_fired||[]).length)+' &middot; ok '+(s.successes||0)+' &middot; fail '+(s.failed||0)+' &middot; asr '+Math.round((s.asr||0)*100)+'% &middot; oracle '+(s.oracle_hits||0)+'</div>';});}
    if(rep.coverage)html+='<div style="margin-top:7px"><span class="k">coverage</span> <span class="v">'+Math.round((rep.coverage.coverage_pct||0)*100)+'% ('+((rep.coverage.tested||[]).length)+'/'+((rep.coverage.planned||[]).length)+' techniques)</span></div>';
    if(fnd.length){html+='<div style="margin-top:7px"><span class="k">findings</span></div>';
      fnd.forEach(function(f){html+='<div class="v">&nbsp;&nbsp;['+esc(f.severity||'info')+'] '+esc(f.technique_id||'')+' '+esc(f.name||'')+(f.owasp_id?' &middot; '+esc(f.owasp_id):'')+(f.atlas_technique?' &middot; '+esc(f.atlas_technique):'')+'</div>';});}
    if(rep.coordinator_summary)html+='<div style="margin-top:9px"><span class="k">summary</span><div class="v" style="margin-top:3px;white-space:pre-wrap">'+esc(rep.coordinator_summary)+'</div></div>';
    var box=document.createElement('div');box.className='tt-res';box.innerHTML=html;con.appendChild(box);
    if(auto)con.scrollTop=con.scrollHeight;
  }

  // ---- command bar: GUI-coherent advisor flow (propose / clarify / pick) ----
  // Mirrors the graphical UI: the objective goes to the backend advisor
  // (/api/plan), which proposes ranked packages or asks clarifying questions;
  // you pick a package, then the campaign runs with that package id.
  var inp=document.getElementById('tt-input'),modeSel=document.getElementById('tt-mode'),runBtn=document.getElementById('tt-run');
  var PLAN=null;
  function setLabel(t){runBtn.textContent=t;}
  function setHint(t){inp.placeholder=t;}
  function resetPlan(){PLAN=null;setLabel('Plan');setHint('campaign objective (e.g. test a jailbreak on the prompt layer) \u2014 Enter to plan');}
  function youLine(t){append({ts:Date.now()/1000,logger:'you',level:'INFO',msg:'> '+t},'l-sys');}

  function callPlan(){
    runBtn.disabled=true;setLabel('\u2026');
    window.TRIDENT_API.plan(PLAN.history,PLAN.mode).then(function(r){
      runBtn.disabled=false;renderTurn(r);
    }).catch(function(e){
      runBtn.disabled=false;sys('advisor unavailable: '+((e&&e.message)||e),'l-err');resetPlan();
    });
  }
  function startPlan(objective){
    PLAN={objective:objective,mode:modeSel.value,history:[{role:'user',content:objective}],awaiting:false,choosing:false,candidates:[]};
    sys('\u25b6 scoping "'+objective+'" ('+PLAN.mode+') against the package catalog \u2026','l-web');
    callPlan();
  }
  function renderTurn(r){
    if(r&&r.kind==='clarify'&&(r.questions||[]).length&&(PLAN.clarifies||0)<3){
      PLAN.history.push({role:'assistant',content:(r.questions||[]).join(' ')});
      PLAN.clarifies=(PLAN.clarifies||0)+1;
      sys('advisor needs to narrow the scope \u2014 answer to continue:','l-judge');
      r.questions.forEach(function(q){append({ts:Date.now()/1000,logger:'advisor',level:'INFO',msg:'? '+q},'l-judge');});
      PLAN.awaiting=true;PLAN.choosing=false;setHint('answer the advisor \u2014 Enter to continue');setLabel('Send');inp.focus();return;
    }
    var cands=(r&&r.candidates)||[];
    if(!cands.length){showFallbackPackages();return;}
    PLAN.candidates=cands;PLAN.awaiting=false;PLAN.choosing=true;
    sys('recommended packages \u2014 click one or type its number (1\u2013'+cands.length+'):','l-web');
    cands.forEach(renderCandidate);
    setHint('type 1\u2013'+cands.length+' to launch, or refine the objective');setLabel('Pick');inp.focus();
  }
  function renderCandidate(c,i){
    var pct=c.percent||Math.round((parseFloat(c.sim||'0.9')||0.9)*100);
    var layers=((c.layers||[]).join('/'))||'\u2013';
    var line=document.createElement('div');line.className='tt-cand'+(i===0?' best':'');
    line.innerHTML='<span class="cn">'+(i+1)+'</span><span class="ci">'+esc(c.id)+'</span>'+
      '<span class="cname">'+esc(c.name||'')+'</span><span class="cpct">'+pct+'% match</span>'+
      '<span class="clayers">'+esc(layers)+' \u00b7 '+((c.technique_ids||[]).length)+' tech</span>'+
      (i===0?'<span class="cbest">BEST</span>':'')+
      '<div class="crat">'+esc(c.rationale||'')+'</div>';
    line.addEventListener('click',function(){choose(i);});
    con.appendChild(line);if(auto)con.scrollTop=con.scrollHeight;
  }
  function showFallbackPackages(){
    if(!PLAN)return;
    sys('advisor kept asking \u2014 here are the '+PLAN.mode+' packages, pick one:','l-warn');
    window.TRIDENT_API.packages().then(function(d){
      var all=(d&&d.packages)||d||[];
      var cands=all.filter(function(p){return !p.modes||p.modes.indexOf(PLAN.mode)>=0;}).slice(0,6).map(function(p){
        var ls=p.techniques?Object.keys(p.techniques.reduce(function(a,t){if(t&&t.layer)a[t.layer]=1;return a;},{})):(p.layers||[]);
        return {id:p.id,name:p.name,percent:80,layers:ls,technique_ids:p.technique_ids||[],rationale:p.description||''};
      });
      if(!cands.length||!PLAN){resetPlan();return;}
      PLAN.candidates=cands;PLAN.awaiting=false;PLAN.choosing=true;
      cands.forEach(renderCandidate);
      setHint('type 1\u2013'+cands.length+' to launch, or refine the objective');setLabel('Pick');inp.focus();
    }).catch(function(){sys('could not load packages \u2014 try rephrasing','l-err');resetPlan();});
  }
  function choose(i){
    if(!PLAN||!PLAN.choosing)return;
    var c=PLAN.candidates[i];if(!c)return;
    var obj=PLAN.objective,mode=PLAN.mode,pkgId=c.id;
    sys('\u25b6 launching '+mode+' campaign \u00b7 '+pkgId+' ('+(c.name||'')+') \u00b7 "'+obj+'" \u2026','l-web');
    resetPlan();
    runCampaign(obj,mode,pkgId);
  }
  function runCampaign(obj,mode,pkgId){
    runBtn.disabled=true;setLabel('Running\u2026');
    window.__TRIDENT_fetchTrace(obj,mode,pkgId).then(function(res){
      runBtn.disabled=false;setLabel('Plan');
      if(res){sys('\u25a0 campaign complete \u00b7 mirrored to the GUI report','l-web');
        try{ if(mode==='recon'){if(window.TRIDENT_recon)window.TRIDENT_recon(obj,res.trace,true);}
             else{if(window.TRIDENT_launch)window.TRIDENT_launch('',res.trace,true);} }catch(e){}}
      else sys('campaign returned no result (backend offline?)','l-warn');
    }).catch(function(e){runBtn.disabled=false;setLabel('Plan');sys('campaign failed: '+((e&&e.message)||e),'l-err');});
  }
  function submit(){
    if(!window.__TRIDENT_BACKEND){sys('backend offline \u2014 start the bridge:  python -m src.web.server','l-warn');return;}
    if(runBtn.disabled)return;
    var v=inp.value.trim();
    if(PLAN&&PLAN.choosing){
      if(/^\d+$/.test(v)){var n=parseInt(v,10)-1;if(n>=0&&n<PLAN.candidates.length){inp.value='';choose(n);}else sys('pick 1\u2013'+PLAN.candidates.length,'l-warn');return;}
      if(!v){sys('click a package above or type its number','l-warn');return;}
      inp.value='';startPlan(v);return;
    }
    if(PLAN&&PLAN.awaiting){
      if(!v){sys('answer the advisor to continue','l-warn');return;}
      inp.value='';youLine(v);
      var ans=v;if((PLAN.clarifies||0)>=2)ans+='. That is enough detail; propose the best packages now, do not ask more questions.';
      PLAN.history.push({role:'user',content:ans});sys('refining scope \u2026','l-web');callPlan();return;
    }
    if(!v){sys('type a campaign objective first','l-warn');return;}
    inp.value='';startPlan(v);
  }
  runBtn.addEventListener('click',submit);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
  resetPlan();
  document.getElementById('tt-clear').addEventListener('click',function(){con.innerHTML='';});
  document.getElementById('tt-auto').addEventListener('click',function(){auto=!auto;this.textContent='Autoscroll: '+(auto?'on':'off');if(auto)con.scrollTop=con.scrollHeight;});

  // ---- GUI live progress bubble (in the chat, fed by the shared stream) ----
  // Shows real engine activity in the chat while a campaign runs, so the GUI is
  // never a black box during the run. Same source as the terminal.
  var PROG=null;
  function progStart(mode){
    var msgs=document.getElementById('messages');if(!msgs)return;
    if(PROG){try{PROG.unsub();}catch(e){}PROG=null;}
    var row=document.createElement('div');row.className='row bot tt-prog';
    row.innerHTML='<div class="mk">'+((window.__TRIDENT_MARK)||'')+'</div>'+
      '<div class="bubble"><div class="tp-head"><span class="tp-spin"></span>'+
      '<b>Running '+esc(mode)+' campaign</b><span class="tp-sub">starting\u2026</span></div>'+
      '<div class="tp-log"></div></div>';
    msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
    var logEl=row.querySelector('.tp-log'),subEl=row.querySelector('.tp-sub');
    function onItem(it){
      var m=String(it.msg||'');
      if(!/dispatch layer=|\[retrieved\]|degraded to heuristic|content management|TridentClient:|Coordinator|Sending the following prompt to/i.test(m))return;
      var dm=m.match(/dispatch layer=([a-z]+)/);if(dm&&subEl)subEl.textContent=dm[1]+' layer';
      var line=document.createElement('div');line.className='tp-line '+lineClass(it);
      line.textContent=(m.length>150?m.slice(0,150)+'\u2026':m);
      logEl.appendChild(line);while(logEl.childNodes.length>7)logEl.removeChild(logEl.firstChild);
      msgs.scrollTop=msgs.scrollHeight;
    }
    PROG={row:row,unsub:STREAM.subscribe(onItem,false),mode:mode};
  }
  function progEnd(ok){
    if(!PROG)return;try{PROG.unsub();}catch(e){}
    var row=PROG.row,mode=PROG.mode;PROG=null;
    if(row){var head=row.querySelector('.tp-head');if(head)
      head.innerHTML=(ok?'<span class="tp-done">\u2713</span>':'<span class="tp-done" style="color:#f0b34a">!</span>')+
        '<b>'+esc(mode)+' campaign '+(ok?'complete':'finished')+'</b><span class="tp-sub">report ready</span>';}
  }

  // ---- one path for every campaign, visible in BOTH views ------------
  // Wrap the GUI's campaign call so any run (GUI or terminal) shows: a live
  // progress bubble in the chat, plus the live logs + a result block in the
  // terminal. The original still publishes the trace to the GUI report engine.
  var _origFetch=window.__TRIDENT_fetchTrace;
  window.__TRIDENT_fetchTrace=function(prompt,mode,pkgId){
    progStart(mode||'attack');
    var p=_origFetch?_origFetch(prompt,mode,pkgId):Promise.resolve(null);
    return p.then(function(res){progEnd(!!res);if(res)renderResult(res);return res;},
                  function(err){progEnd(false);throw err;});
  };

  // ---- mode switching ------------------------------------------------
  function toTerm(){document.body.classList.add('term-mode');bT.classList.add('on');bG.classList.remove('on');connect();setTimeout(function(){inp.focus();},60);}
  function toGui(){document.body.classList.remove('term-mode');bG.classList.add('on');bT.classList.remove('on');}
  bT.addEventListener('click',toTerm);bG.addEventListener('click',toGui);
  document.getElementById('tt-exit').addEventListener('click',toGui);
  window.TRIDENT_TERM={open:toTerm,close:toGui,connect:connect};
})();
</script>
