  .brand{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:60px;letter-spacing:.5px;color:#fff;line-height:1;text-transform:none;text-shadow:0 0 1px #000,0 0 4px rgba(0,0,0,.85),0 0 18px rgba(225,30,40,.4)}
  :root{
    --font:"universalSans",Inter,Roboto,"Open Sans",Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#0c0c0e; --fg:#f4f4f5; --secondary:#a7a7ad; --muted:#76767d;
    --surface-1:#1a1a1d; --surface-2:#212125; --surface-3:#2a2a2f;
    --border:rgba(255,255,255,.10); --hover:rgba(255,255,255,.06); --active:rgba(255,255,255,.10);
    --sidebar-bg:#0f0f11; --ring:inset 0 0 0 1px rgba(255,255,255,.08), 0 1px 2px rgba(0,0,0,.4);
    --btn-black:#fff; --btn-black-fg:#0c0c0e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;left:58%;top:40%;width:1100px;height:760px;transform:translate(-50%,-50%);
    background:radial-gradient(ellipse at center, rgba(255,42,42,.30), rgba(225,30,40,.12) 42%, transparent 70%);
    filter:blur(60px);pointer-events:none;z-index:-1;animation:glowpulse 6.5s ease-in-out infinite}
  .main{position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  svg{display:block}

  /* ===== SIDEBAR ===== */
  .sidebar{width:256px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;
    transition:width .2s cubic-bezier(.4,0,.2,1);overflow:hidden;border-right:1px solid var(--border)}
  body.collapsed .sidebar{width:60px}
  .sb-head{display:flex;align-items:center;height:56px;padding:0 12px;gap:6px}
  .sb-mark{width:30px;height:30px;display:grid;place-items:center;color:var(--fg);flex-shrink:0;border-radius:8px}
  .sb-mark:hover{background:var(--hover)}
  .sb-collapse{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--fg);margin-left:auto;border:0;background:none;cursor:pointer}
  .sb-collapse:hover{background:var(--hover);color:var(--fg)}
  .sb-home{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;padding:0;border:0;background:none;cursor:pointer}
  .sb-home:hover{background:var(--hover)}
  .sb-home img{width:26px;height:26px;object-fit:contain;display:block}
  body.collapsed .sb-head{flex-direction:column;height:auto;padding:10px 0;gap:8px}
  body.collapsed .sb-collapse{margin-left:0}

  .sb-actions{padding:4px 8px;display:flex;flex-direction:column;gap:2px}
  .sb-btn{display:flex;align-items:center;gap:12px;height:40px;padding:0 12px;border-radius:10px;color:var(--fg);font-size:14px;font-weight:500;white-space:nowrap;width:100%;text-align:left}
  .sb-btn .ic{width:20px;height:20px;flex-shrink:0;display:grid;place-items:center;color:var(--secondary)}
  .sb-btn:hover{background:var(--hover)}
  body.collapsed .sb-btn .tx{display:none}
  body.collapsed .sb-btn{justify-content:center;padding:0}

  .sb-search{margin:4px 8px 2px;display:flex;align-items:center;gap:10px;height:40px;padding:0 12px;border-radius:10px;background:var(--surface-2)}
  .sb-search input{background:none;border:none;outline:none;color:var(--fg);font-size:14px;width:100%}
  .sb-search input::placeholder{color:var(--muted)}
  body.collapsed .sb-search{display:none}

  .history{flex:1;overflow-y:auto;padding:8px;margin-top:4px}
  .history::-webkit-scrollbar{width:8px}.history::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  .history::-webkit-scrollbar-track{background:transparent}
  body.collapsed .history{display:none}
  .grp-label{font-size:12px;font-weight:600;color:var(--muted);padding:12px 12px 4px}
  .chat-item{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px 0 12px;border-radius:9px;font-size:14px;color:var(--fg);white-space:nowrap;overflow:hidden;cursor:pointer}
  .chat-item .t{flex:1;overflow:hidden;text-overflow:ellipsis}
  .chat-item:hover{background:var(--hover)}
  .chat-item.active{background:var(--active)}
  .chat-item .del{opacity:0;width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--muted);flex-shrink:0}
  .chat-item:hover .del{opacity:1}
  .chat-item .del:hover{background:var(--surface-3);color:var(--fg)}

  .sb-foot{padding:8px;border-top:1px solid var(--border)}
  .sb-btn.danger .ic{color:#e0484f}
  .sb-btn.danger:hover{background:rgba(225,29,42,.10)}
  .sb-btn.danger:hover .tx{color:#ff6168}
  .acct{display:flex;align-items:center;gap:10px;height:48px;padding:0 8px;border-radius:10px;width:100%}
  .acct:hover{background:var(--hover)}
  .acct .av{width:30px;height:30px;border-radius:50%;background:var(--btn-black);color:var(--btn-black-fg);display:grid;place-items:center;font-size:13px;font-weight:700;flex-shrink:0}
  .acct .nm{display:flex;flex-direction:column;line-height:1.2;text-align:left;overflow:hidden}
  .acct .nm b{font-size:13.5px;font-weight:600;white-space:nowrap}
  .acct .nm span{font-size:12px;color:var(--muted);white-space:nowrap}
  body.collapsed .acct .nm{display:none}
  body.collapsed .acct{justify-content:center;padding:0}

  /* ===== MAIN ===== */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .topbar{height:56px;display:flex;align-items:center;padding:0 16px;gap:6px}
  .spacer{flex:1}
  .top-link{display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;border-radius:10px;font-size:14px;font-weight:600;color:var(--fg)}
  .top-link:hover{background:var(--hover)}
  .icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--fg)}
  .icon-btn:hover{background:var(--hover)}
  .pill{height:38px;padding:0 18px;border-radius:999px;font-size:14px;font-weight:600;display:flex;align-items:center}
  .pill.ghost{border:1px solid var(--border)}.pill.ghost:hover{background:var(--hover)}
  .pill.solid{background:var(--btn-black);color:var(--btn-black-fg)}.pill.solid:hover{opacity:.88}

  #chainFull .cf-top .sp{flex:1}
  #chainFull .cf-body{flex:1;min-height:0;display:flex;flex-direction:column;padding:26px 30px}
  #chainFull .chain-flow{flex:1;overflow:auto;gap:16px}
  #chainFull .cstep{opacity:1;transform:none}
  #chainFull .cstep .tip{display:none}
  #chainFull .cstep .cx{display:block;width:100%;text-align:left;font-size:12.5px;line-height:1.5;color:#c4c4cc;margin-top:2px;padding-top:10px;border-top:1px solid rgba(255,255,255,.09)}
  /* fullscreen "Attacks by layer" view (sized to content, centered in the page) */
  #chainFull .cf-body{justify-content:center}
  #chainFull .cf-cols{flex:0 1 auto;min-height:0;max-height:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:34px;max-width:1100px;width:100%;margin:0 auto}
  #chainFull .cf-cols .lcol-dot{width:34px;height:34px}
  #chainFull .cf-cols .lcol-name{font-size:14px}
  #chainFull .cf-cols .lcol-count{font-size:12px}
  #chainFull .cf-cols .lcol-stem{height:22px}
  #chainFull .cf-cols .lcol-atks{gap:13px;padding-top:6px}
  #chainFull .cf-cols .latk-dot{width:13px;height:13px}
  #chainFull .cf-cols .latk-name{font-size:14px;-webkit-line-clamp:3;line-clamp:3}

  /* ===== "Attacks by layer" — WOW per-layer graph (fullscreen detail) ===== */
  #chainFull .cf-body:has(.wow-cols){justify-content:flex-start}
  #chainFull .wow-cols{flex:1;min-height:0;width:100%;max-width:1180px;margin:0 auto;overflow:auto;
    display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(18px,3vw,34px);align-items:start;align-content:start;padding:8px 4px 26px}
  #chainFull .wow-cols::-webkit-scrollbar{width:8px}
  #chainFull .wow-cols::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}
  .wow-col{display:flex;flex-direction:column;align-items:center;min-width:0}
  .wow-orb{position:relative;width:clamp(66px,8.6vh,86px);height:clamp(66px,8.6vh,86px);display:grid;place-items:center;flex:0 0 auto;margin-bottom:9px}
  .wow-orb-glow{display:none}
  .wow-orb-ring{display:none}
  .wow-orb-core{position:relative;z-index:2;width:100%;height:100%;border-radius:50%;display:grid;place-items:center;background:var(--lc)}
  .wow-orb-count{font-family:ui-monospace,monospace;font-weight:800;font-size:clamp(22px,3.2vh,30px);color:#fff;text-shadow:none}
  @keyframes wowPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.14);opacity:.12}}
  .wow-head{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:2px;text-align:center}
  .wow-layer{font-size:clamp(13px,1.7vh,15px);font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--lc)}
  .wow-sub{font-size:11px;color:#83838c;font-family:ui-monospace,monospace}
  .wow-flow{display:flex;flex-direction:column;align-items:center;width:100%;max-width:300px;margin-top:1px}
  .wow-conn{position:relative;width:2px;height:clamp(22px,3.4vh,34px);flex:0 0 auto;
    background:var(--ac);background:linear-gradient(180deg,color-mix(in srgb,var(--ac) 78%,transparent),color-mix(in srgb,var(--ac) 24%,transparent))}
  .wow-conn::after{content:"";position:absolute;left:50%;top:-2px;width:5px;height:5px;border-radius:50%;
    background:var(--ac);transform:translateX(-50%);box-shadow:0 0 9px 1px var(--ac);animation:wowFlow 1.9s linear infinite}
  .wow-arrow{position:absolute;left:50%;bottom:2px;width:9px;height:9px;transform:translateX(-50%) rotate(45deg);
    border-right:2.5px solid var(--ac);border-bottom:2.5px solid var(--ac)}
  @keyframes wowFlow{0%{top:-2px;opacity:0}18%{opacity:1}82%{opacity:1}100%{top:100%;opacity:0}}
  .wow-card{position:relative;width:100%;border-radius:14px;padding:12px 14px 13px 18px;overflow:hidden;
    background:linear-gradient(160deg,rgba(255,255,255,.065),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 24px -12px rgba(0,0,0,.7);
    opacity:0;transform:translateY(14px) scale(.97);
    animation:wowCardIn .5s cubic-bezier(.2,.8,.25,1) forwards;animation-delay:calc(var(--i,0)*70ms + 120ms);
    transition:transform .2s,box-shadow .2s,border-color .2s}
  .wow-card:hover{transform:translateY(-3px);border-color:var(--sc);box-shadow:0 16px 32px -12px rgba(0,0,0,.8),0 0 18px -6px var(--sc)}
  .wow-card-bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sc)}
  @keyframes wowCardIn{to{opacity:1;transform:none}}
  .wow-card-top{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-bottom:4px}
  .wow-id{font-family:ui-monospace,monospace;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--sc)}
  .wow-sev{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#0b0b0d;background:var(--sv);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .wow-name{font-size:13.5px;font-weight:700;color:#f1f1f4;line-height:1.25}
  .wow-meta{margin-top:4px;font-family:ui-monospace,monospace;font-size:10.5px;color:#7c7c85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wow-outcome{margin-top:7px;font-size:11.5px;line-height:1.4;color:#b6b9c1;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .wow-state{margin-top:9px;display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:#d2d5db}
  .wow-state-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px -1px currentColor}
  .wow-card.empty{opacity:.5;text-align:center;border-style:dashed;animation-delay:120ms}
  .wow-card.empty .wow-card-bar{display:none}
  .wow-card.empty .wow-name{font-style:italic;color:#83838c;font-weight:500}
  @media (prefers-reduced-motion:reduce){.wow-orb-ring,.wow-conn::after{animation:none}.wow-card{animation:none;opacity:1;transform:none}}

  /* right: per-layer success + findings by severity (two equal halves) */
  .p-side{grid-column:3;grid-row:2;display:flex;flex-direction:column;padding:0;overflow:hidden}
  .ps-sec{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:clamp(12px,2vh,18px) 18px}
  .ps-div{height:1px;background:rgba(255,255,255,.09);flex:0 0 auto}
  .lrows{display:flex;flex-direction:column;gap:clamp(9px,1.8vh,15px)}
  .p-side .lrows{flex:1;justify-content:space-evenly}
  .lrow{display:grid;grid-template-columns:78px 1fr 42px;gap:10px;align-items:center}
  .lrow .ln{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
  .lrow .ln i{width:8px;height:8px;border-radius:2px;display:block}
  .lbar{height:10px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
  .lbar i{display:block;height:100%;width:0;border-radius:5px;transition:width 1s cubic-bezier(.3,1,.4,1)}
  .lrow .lp{font-family:ui-monospace,monospace;font-size:14px;font-weight:700;text-align:right}
  .sev{display:flex;align-items:flex-end;gap:11px;height:clamp(76px,14vh,128px);margin-top:8px}
  .sev .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;justify-content:flex-end;height:100%}
  .sev .bar{width:100%;border-radius:6px 6px 0 0;height:0;min-height:3px;transition:height .9s cubic-bezier(.3,1,.4,1)}
  .sev .cn{font-family:ui-monospace,monospace;font-size:13px;font-weight:700}
  .sev .cl{font-size:9px;color:#9a9aa3;text-transform:uppercase;letter-spacing:.04em}

  /* bottom: KPI strip (symmetric, 5 columns) */
  .p-kpis{grid-column:1/-1;grid-row:3;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:0;border:none;background:none;overflow:visible}
  .kpi{border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:clamp(9px,1.6vh,13px) 16px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
    opacity:0;transform:translateY(12px);transition:opacity .5s,transform .5s}
  #dboard.show .kpi{opacity:1;transform:none}
  .kpi b{display:block;font-family:ui-monospace,Consolas,monospace;font-size:clamp(20px,3vh,27px);font-weight:700;line-height:1}
  .kpi span{font-size:11px;color:#9a9aa3;margin-top:5px;display:block}

  /* ===== per-layer attack columns (replaces the kill chain) ===== */
  .p-chain .layer-cols{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:clamp(8px,1.8vh,16px);overflow:hidden;padding:4px 2px;cursor:zoom-in}
  .lf-flow{display:flex;align-items:flex-start;justify-content:center;gap:clamp(4px,1.2vw,12px)}
  .lf-node{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;width:clamp(62px,7.5vw,90px);transition:transform .15s}
  .p-chain .layer-cols:hover .lf-node{transform:translateY(-1px)}
  .lf-orb{width:clamp(40px,5.4vh,52px);height:clamp(40px,5.4vh,52px);border-radius:50%;background:var(--lc);display:grid;place-items:center;flex:0 0 auto}
  .lf-count{font-family:ui-monospace,monospace;font-weight:800;font-size:clamp(15px,2.3vh,19px);color:#fff}
  .lf-node.empty .lf-orb{background:transparent;border:2px dashed color-mix(in srgb,var(--lc) 50%,#3a3a42)}
  .lf-node.empty .lf-count{color:color-mix(in srgb,var(--lc) 62%,#76767d)}
  .lf-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--lc);text-align:center;line-height:1.1}
  .lf-sub{font-size:10px;color:#83838c;font-family:ui-monospace,monospace;text-align:center}
  .lf-arrow{display:flex;align-items:center;color:#56565f;flex:0 0 auto;margin-top:clamp(11px,1.6vh,18px);transition:color .15s,transform .15s}
  .p-chain .layer-cols:hover .lf-arrow{color:#7c7c85}
  .lf-cta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;border-radius:10px;border:1px dashed rgba(255,255,255,.12);background:rgba(255,255,255,.02);transition:border-color .15s,background .15s}
  .p-chain .layer-cols:hover .lf-cta{border-color:rgba(225,29,42,.4);background:rgba(225,29,42,.06)}
  .lf-cta-txt{font-size:11px;color:#9a9aa3;font-family:ui-monospace,monospace}
  .lf-cta-go{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#e7e7ea;white-space:nowrap}
  .lf-cta-go svg{transition:transform .15s}
  .p-chain .layer-cols:hover .lf-cta-go svg{transform:translateX(3px)}
  .lcol{display:flex;flex-direction:column;align-items:center;min-height:0;overflow:hidden}
  .lcol-head{display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto}
  .lcol-dot{width:clamp(20px,3.2vh,28px);height:clamp(20px,3.2vh,28px);border-radius:50%;box-shadow:0 0 0 4px rgba(255,255,255,.05)}
  .lcol-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .lcol-count{font-size:10px;color:#76767d;font-family:ui-monospace,monospace}
  .lcol-stem{width:2px;height:clamp(8px,1.6vh,16px);flex:0 0 auto;opacity:.5;margin:1px 0}
  .lcol-atks{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:clamp(5px,1vh,9px);align-items:stretch;width:100%;padding:2px 3px 4px}
  .lcol-atks::-webkit-scrollbar{width:6px}.lcol-atks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:6px}
  .latk{display:flex;align-items:center;gap:8px;width:100%;opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s}
  .latk.in{opacity:1;transform:none}
  .latk-dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px -1px currentColor}
  .latk-name{font-size:12px;color:#dfe3e8;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}
  .latk-empty{opacity:.45}
  .latk-empty .latk-dot{background:#555!important;box-shadow:none}
  .latk-empty .latk-name{font-style:italic;color:#76767d}
  /* ===== attack-chain timeline replay (bottom) ===== */
  .p-timeline{display:flex;flex-direction:column;gap:7px;min-height:0}
  .p-timeline .tl-head{display:flex;align-items:center;gap:12px}
  .p-timeline .tl-head .ph{margin-bottom:0;flex:1}
  .tl-ctrls{display:flex;align-items:center;gap:6px}
  .tl-btn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#f4f4f5;font-size:15px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:background .15s,border-color .15s}
  .tl-btn:hover{background:rgba(255,255,255,.1)}
  .tl-btn:disabled{opacity:.4;cursor:default}
  .tl-btn.play.on{background:#e11d2a;border-color:transparent;color:#fff}
  .tl-track{flex:1;min-height:0;display:flex;align-items:flex-start;gap:0;overflow-x:auto;overflow-y:hidden;padding:6px 2px}
  .tl-track::-webkit-scrollbar{height:7px}.tl-track::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:7px}
  .tl-step{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:clamp(86px,11vw,128px)}
  .tl-node{width:clamp(28px,4vh,34px);height:clamp(28px,4vh,34px);border-radius:50%;border:2px solid rgba(255,255,255,.16);background:rgba(255,255,255,.03);display:grid;place-items:center;flex:0 0 auto;transition:border-color .25s,background .25s,transform .25s,box-shadow .25s}
  .tl-num{font-family:ui-monospace,monospace;font-weight:700;font-size:13px;color:#9a9aa3;transition:color .25s}
  .tl-step.on .tl-node{border-color:var(--lc);background:rgba(255,255,255,.06)}
  .tl-step.on .tl-num{color:#fff}
  .tl-step.cur .tl-node{transform:scale(1.14);box-shadow:0 0 0 4px rgba(255,255,255,.08),0 0 14px -2px var(--lc)}
  .tl-lbl{margin-top:7px;text-align:center;display:flex;flex-direction:column;gap:1px;max-width:100%;opacity:.5;transition:opacity .25s;cursor:pointer}
  .tl-step.on .tl-lbl{opacity:1}
  .tl-layer{font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
  .tl-title{font-size:11px;color:#cdd3da;line-height:1.2;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}
  .tl-conn{flex:0 0 auto;width:clamp(16px,2.4vw,44px);height:2px;background:rgba(255,255,255,.12);margin-top:clamp(13px,2vh,17px);border-radius:2px;transition:background .25s}
  .tl-conn.on{background:#e11d2a}
  .tl-detail{flex:0 0 auto;font-size:12px;color:#c3ccd6;line-height:1.4;padding:7px 12px;background:rgba(225,29,42,.06);border:1px solid rgba(225,29,42,.18);border-radius:9px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .tl-detail b{color:#ff8f93}
  .tl-empty{color:#76767d;font-size:13px;padding:10px}
  /* ===== bottom "Attack flow" (always Prompt -> Application -> Model, incl. failed) ===== */
  .p-timeline .fl-head{display:flex;align-items:center;gap:12px}
  .p-timeline .fl-head .ph{margin-bottom:0;flex:1}
  .fl-legend{display:flex;align-items:center;gap:14px;font-size:10.5px;color:#83838c}
  .fl-legend i{display:inline-flex;align-items:center;gap:5px;font-style:normal}
  .fl-legend i::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--c)}
  .fl-stages{flex:1;min-height:0;display:flex;align-items:stretch;gap:0;padding:4px 2px 2px}
  .fl-stage{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:9px;border:1px solid rgba(255,255,255,.08);border-top:2px solid var(--lc);border-radius:12px;padding:11px 12px;background:linear-gradient(180deg,color-mix(in srgb,var(--lc) 8%,transparent),rgba(255,255,255,.012))}
  .fl-stage-head{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .fl-dot{width:12px;height:12px;border-radius:50%;background:var(--lc);flex:0 0 auto;box-shadow:0 0 9px -1px var(--lc)}
  .fl-layer{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--lc)}
  .fl-cnt{margin-left:auto;font-family:ui-monospace,monospace;font-size:11px;color:#9a9aa3;background:rgba(255,255,255,.05);border-radius:999px;padding:2px 9px}
  .fl-atks{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px}
  .fl-atks::-webkit-scrollbar{width:6px}.fl-atks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:6px}
  .fl-atk{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-left:3px solid var(--sc);transition:background .15s,transform .15s}
  .fl-atk:hover{background:rgba(255,255,255,.06);transform:translateX(2px)}
  .fl-atk-dot{width:8px;height:8px;border-radius:50%;background:var(--sc);flex:0 0 auto;box-shadow:0 0 7px -1px var(--sc)}
  .fl-atk-id{font-family:ui-monospace,monospace;font-size:10.5px;font-weight:700;color:var(--sc);flex:0 0 auto}
  .fl-atk-name{font-size:11.5px;color:#dfe3e8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  .fl-atk-state{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--sc);flex:0 0 auto}
  .fl-stage.empty .fl-atks{align-items:center;justify-content:center}
  .fl-empty{font-size:11.5px;color:#76767d;font-style:italic;text-align:center;padding:12px 6px;border:1px dashed rgba(255,255,255,.12);border-radius:8px;width:100%}
  .fl-arrow{flex:0 0 auto;align-self:center;display:flex;align-items:center;color:#56565f;padding:0 clamp(4px,1vw,12px)}

  /* ===== SCAN overlay ===== */
  #scan{padding:0 9vw;display:none;flex-direction:column;justify-content:center;gap:6px;
    font-family:ui-monospace,Consolas,monospace;font-size:15px;line-height:1.7;color:#d7dad7}
  #scan.on{display:flex}
  #scan .ln .ok{color:#ff4d4d}
  #scan .ln .ac{color:#ff5258}
  #scan .cur{display:inline-block;width:8px;height:15px;background:#e11d2a;margin-left:3px;vertical-align:-2px;animation:bk 1s steps(1) infinite}
  #scan::before{content:"";position:fixed;left:58%;top:40%;width:1100px;height:760px;transform:translate(-50%,-50%);
    background:radial-gradient(ellipse at center, rgba(255,42,42,.30), rgba(225,30,40,.12) 42%, transparent 70%);
    filter:blur(60px);pointer-events:none;z-index:0;animation:glowpulse 6.5s ease-in-out infinite}
  #scan>*{position:relative;z-index:1}

  /* ===== AGENT planning (rendered inline in the chat) ===== */
  #agentchat{display:none}
  .ac-plan{animation:acIn .35s both}
  @keyframes acIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ac-plan .bubble{flex:1 1 auto;min-width:0}
  .ac-plan .bubble b{color:var(--fg)}
  .ac-tools{display:flex;flex-wrap:wrap;gap:8px;margin:11px 0 3px}
  .ac-tool{display:inline-flex;align-items:center;max-width:100%;box-sizing:border-box;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;line-height:1.2;color:#cfeadd;background:rgba(95,175,138,.07);border:1px solid rgba(95,175,138,.3);border-radius:8px;padding:5px 11px;white-space:nowrap;animation:actoolin .26s ease both}
  @keyframes actoolin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .ac-tool .tk{color:#e7efe9;font-weight:600;overflow:hidden;text-overflow:ellipsis}
  .ac-tool .sp2,.ac-tool .tq,.ac-tool .res{display:none}
  .ac-tool .tk-r{color:#9fb4ab;font-weight:500}
  .ac-tool.loading{opacity:.8}
  .ac-tool.ac-tool-ok{color:#cfeadd;background:rgba(95,175,138,.13);border-color:rgba(95,175,138,.5);cursor:pointer}
  .ac-tool.ac-tool-ok .tk-r{color:#86c7a6}
  .ac-tool.ac-tool-warn{color:#e6d6ad;background:rgba(205,180,95,.1);border-color:rgba(205,180,95,.45);cursor:pointer}
  .ac-tool.ac-tool-warn .tk-r{color:#d9c074}
  .ac-tool.ac-tool-ok:hover,.ac-tool.ac-tool-warn:hover{filter:brightness(1.18)}

  .xr-srcslot:empty{display:none}
  .xr-secsrc{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:13px;padding-top:9px;border-top:1px dashed rgba(0,0,0,.14)}
  .xr-secsrck{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a9aa3;display:inline-flex;align-items:center}
  .xr-secsrck::after{content:"";width:1px;height:11px;background:rgba(0,0,0,.18);margin-left:8px}
  .xr-cite{display:inline-flex;align-items:center;gap:6px;max-width:100%;text-decoration:none;border:1px solid rgba(0,0,0,.12);border-radius:7px;padding:3px 9px 3px 6px;background:#f7f7f9}
  .xr-cite:hover{background:#eef0f3;border-color:rgba(0,0,0,.22)}
  .xr-cn{flex:none;font-size:9px;font-weight:800;color:#fff;background:#e11d2a;border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;line-height:1}
  .xr-ct{font-size:11.5px;font-weight:600;color:#2f6db0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
  .xr-cd{font-size:10px;color:#9a9aa3;font-family:ui-monospace,monospace}
  .xr-groundnote{font-size:11px;color:#8a8a92;line-height:1.45;margin-top:9px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08)}
  .xr-gq{font-weight:400;text-transform:none;letter-spacing:0;color:#9a9aa3;font-size:11px}
  .xr-ground.pending{background:#fafafa}
  .xr-gslot:empty{display:none}
  /* woven web-grounded enrichment: reads as part of the section narrative, not a separate card */
  .xr-woven{margin:9px 0 2px;padding-left:12px;border-left:2px solid #d4dde7}
  .xr-woven.loading{display:flex;align-items:center;gap:9px;color:#6b6b73;font-size:12px;font-style:italic;border-left-color:#e4e4ea;padding:2px 0 2px 12px}
  .xr-wtag{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9aa3ad;margin-bottom:5px}
  .xr-gdot{width:6px;height:6px;border-radius:50%;background:#5a8fc0;flex:none}
  .xr-woven .xr-groundt{font-size:12.5px;color:#2c2c33;line-height:1.55}
  .xr-woven .xr-secsrc{margin-top:16px;padding-top:12px}
  .xr-gspin{width:12px;height:12px;border:2px solid rgba(0,0,0,.15);border-top-color:#2f6db0;border-radius:50%;display:inline-block;animation:xrspin .8s linear infinite}
  @keyframes xrspin{to{transform:rotate(360deg)}}
  .xr-foot{margin-top:34px;padding-top:16px;border-top:1px solid rgba(0,0,0,.1);font-size:11px;color:#8a8a92;line-height:1.6}
  .xr-ctsub{font-weight:600;color:#6b6b73;font-size:11px;margin-left:6px}
  .xr-badge{float:right;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid}
  .xr-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .xr-big{font-size:24px;font-weight:800;margin:2px 0 10px;color:#15151a}
  .xr-big span{font-size:13px;font-weight:600;color:#6b6b73}
  .xr-donutwrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center}
  .xr-leglist{display:grid;gap:7px;min-width:140px}
  .xr-leg{display:flex;align-items:center;gap:7px;font-size:12px;color:#52525b}
  .xr-leg b{font-weight:600;color:#15151a}
  .xr-legv{color:#8a8a92;margin-left:auto;font-variant-numeric:tabular-nums}
  .xr-legrow{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:8px}
  .xr-dot{width:10px;height:10px;border-radius:50%;flex:none;display:inline-block}
  .xr-tgroup{margin-bottom:16px}
  .xr-tglabel{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#15151a;margin-bottom:4px}
  .xr-ev{border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#f7f7f9}
  .xr-evh{font-size:13px;font-weight:600;margin-bottom:8px;color:#15151a}
  .xr-evrow{display:flex;gap:8px;font-size:12px;line-height:1.5;margin:3px 0;color:#52525b}
  .xr-evtag{flex:none;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;height:fit-content;color:#fff}
  .xr-evtag.atk{background:#a85f7d}
  .xr-evtag.bot{background:#4596ab}
  .xr-evcap{font-size:11.5px;color:#6b6b73;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(0,0,0,.16)}
  .xr-subh{font-family:'Newsreader',Georgia,serif;font-size:17px;font-weight:600;margin:26px 0 4px;color:#15151a}
  .xr-levels{display:grid;gap:10px;margin-top:6px}
  .xr-lvl{display:grid;grid-template-columns:88px 1fr auto;gap:12px;align-items:center;border:1px solid rgba(0,0,0,.1);border-radius:9px;padding:10px 14px;background:#f7f7f9}
  .xr-lvl.cur{border-color:#e11d2a;background:rgba(225,29,42,.07)}
  .xr-lvi{font-weight:800;font-size:14px;color:#15151a}
  .xr-now{display:inline-block;font-size:9px;font-weight:700;color:#e11d2a;border:1px solid rgba(225,29,42,.45);border-radius:5px;padding:1px 5px;vertical-align:middle}
  .xr-lve{font-size:12.5px;color:#52525b}
  .xr-lvp{font-size:12.5px;color:#52525b;text-align:right;white-space:nowrap}
  .xr-trace{border:1px solid rgba(0,0,0,.1);border-radius:9px;overflow:hidden}
  .xr-trow{display:grid;grid-template-columns:62px 76px 1fr;gap:8px;font-size:11.5px;padding:6px 12px;border-bottom:1px solid rgba(0,0,0,.07);align-items:baseline}
  .xr-trow:last-child{border-bottom:0}
  .xr-tt{font-family:ui-monospace,monospace;color:#8a8a92}
  .xr-tk{font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
  .xr-tm{color:#52525b;line-height:1.4}
  @media(max-width:720px){.xr-kpis{grid-template-columns:repeat(2,1fr)}.xr-charts{grid-template-columns:1fr}.xr-gloss{grid-template-columns:1fr}.xr-page{padding:28px 22px}}
  @media print{
    @page{size:A4;margin:13mm}
    html,body{background:#ffffff!important}
    body.printing>*{display:none!important}
    body.printing #exportReport{display:block!important;position:static!important;inset:auto!important;overflow:visible!important;background:#ffffff!important;height:auto!important}
    .xr-top,.no-print{display:none!important}
    .xr-page{max-width:none;margin:0;border:0;border-radius:0;box-shadow:none;padding:0;background:#ffffff!important}
    .xr-fix,.xr-step,.xr-chartbox,.xr-tgroup,.xr-ev,.xr-lvl,.xr-trow,table.xr-tbl tr,.xr-banner{break-inside:avoid}
    .xr-sh{break-after:avoid}
    .xr-grid2{break-inside:avoid}
    .xr-kpi,.xr-chartbox{background:#f7f7f9}
  }

  function group(ts){const d=Date.now()-ts;const day=864e5;if(d<day)return"Today";if(d<2*day)return"Yesterday";if(d<7*day)return"Last 7 days";return"Earlier";}

  function renderHistory(f){
    f=(f||"").toLowerCase();historyEl.innerHTML="";
    const list=state.chats.filter(c=>!f||c.title.toLowerCase().includes(f));
    if(!list.length){historyEl.innerHTML='<div style="padding:14px 12px;color:var(--muted);font-size:13.5px">No chats</div>';return;}
    let lastG=null;
    list.forEach(c=>{
      const g=group(c.ts||Date.now());
      if(g!==lastG){lastG=g;const l=document.createElement("div");l.className="grp-label";l.textContent=g;historyEl.appendChild(l);}

      it.innerHTML='<span class="t"></span><button class="del" title="Delete"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>';

      it.querySelector(".del").addEventListener("click",e=>{e.stopPropagation();state.chats=state.chats.filter(x=>x.id!==c.id);if(state.activeId===c.id)state.activeId=state.chats[0]?state.chats[0].id:null;save();renderAll();});
      historyEl.appendChild(it);
    });
  }

  function renderMessages(){

        if(tg&&det)tg.onclick=function(){det.classList.toggle("open");tg.textContent=det.classList.contains("open")?"Hide details":"Technique details";if(det.classList.contains("open")){const acts=card.querySelector(".pk-acts");if(acts)setTimeout(function(){acts.scrollIntoView({block:"nearest",behavior:"smooth"});},480);}};

      if(del&&ci===0){del=false;pi=(pi+1)%ph.length;}
      setTimeout(tick,del?35:65);
    }
    tick();
  })();

<script>
(function(){
  // ---- matrix rain (subtle, crimson) ----
  var cv=document.getElementById('matrix'),cx=cv.getContext('2d'),cols,drops,fs=15;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;cols=Math.ceil(cv.width/fs);drops=new Array(cols).fill(0).map(function(){return Math.random()*cv.height/fs;});}
  resize();window.addEventListener('resize',resize);
  var chars="01001011ABCDEF<>/\\#$%&*+=ｱｲｳｴｵｶｷｸｹｺ日二三四五".split("");
  function draw(){
    cx.fillStyle="rgba(8,8,10,0.09)";cx.fillRect(0,0,cv.width,cv.height);
    cx.font=fs+"px ui-monospace,Consolas,monospace";
    for(var i=0;i<cols;i++){
      var t=chars[Math.floor(Math.random()*chars.length)];
      var x=i*fs,y=drops[i]*fs;
      cx.fillStyle=(Math.random()>0.97)?"rgba(255,120,120,0.9)":"rgba(220,38,46,0.7)";
      cx.fillText(t,x,y);
      if(y>cv.height&&Math.random()>0.975)drops[i]=0;
      drops[i]+=0.55;
    }
  }
  setInterval(draw,55);

})();
</script>

  function compute(techs){
    var all=techs.filter(function(t){return t.state;});
    var blockedAll=all.filter(function(t){return t.state==='blocked';});
    var executed=all.filter(function(t){return t.state!=='blocked';});
    var failed=executed.filter(function(t){return t.state==='failed';});
    var succeeded=executed.filter(function(t){return t.state!=='failed';});
    var asr=executed.length?Math.round(succeeded.length/executed.length*100):0;
    var confirmed=executed.filter(function(t){return t.state==='confirmed';}).length;
    var criticals=succeeded.filter(function(t){return t.sev==='crit';}).length;
    var layers=LAYERS.map(function(L){
      var ex=executed.filter(function(t){return t.layer===L.k;});
      var ok=ex.filter(function(t){return t.state!=='failed';});
      return {k:L.k,n:L.n,c:L.c,fired:ex.length,ok:ok.length,
        oracle:ex.filter(function(t){return t.state==='confirmed';}).length,
        pct:ex.length?Math.round(ok.length/ex.length*100):0};
    }).filter(function(L){return L.fired>0;});
    var sev={};SEV.forEach(function(s){sev[s.k]=0;});
    succeeded.forEach(function(t){if(sev[t.sev]!=null)sev[t.sev]++;});
    return {fired:executed.length,blocked:blockedAll.length,failedN:failed.length,okN:succeeded.length,asr:asr,confirmed:confirmed,criticals:criticals,layers:layers,sev:sev};
  }

    var bits=[];
    var map=[c.owasp?('OWASP '+c.owasp):'',c.atlas?('ATLAS '+c.atlas):''].filter(Boolean).join(' \u00b7 ');
    if(map)bits.push('<span><b>Maps to</b> '+esc2(map)+'</span>');
    var sevTxt={crit:'Critical',high:'High',med:'Medium',low:'Low',info:'Info'}[c.sev]||(c.sev||'');
    if(sevTxt)bits.push('<span><b>Severity</b> '+esc2(sevTxt)+'</span>');
    if(c.ctrl&&c.ctrl.length)bits.push('<span><b>Defended by</b> '+esc2(c.ctrl.join(', '))+'</span>');
    return '<p class="pk-txd">'+esc2(d)+'</p>'+(bits.length?'<div class="pk-txmeta">'+bits.join('')+'</div>':'');
  }

  function parseTrace(text){
    var rows=[];
    text.split(/\r?\n/).forEach(function(l){l=l.trim();if(!l)return;try{rows.push(JSON.parse(l));}catch(e){}});
    return rows;
  }

  function buildReport(text,pkgTechs){
    var rows=parseTrace(text);
    var byTech={}, order=[], blocked={}, target="target", endpoint="", firstTs=null, attempts=0;
    rows.forEach(function(r){
      if(!firstTs&&r.timestamp)firstTs=r.timestamp;
      var tid=r.technique_id;
      if(r.kind==='gate'&&tid){
        var d=(r.payload&&r.payload.decision)||{};
        if(d.allow===false){blocked[tid]=true;}
        if(r.payload&&r.payload.params&&r.payload.params.endpoint)endpoint=r.payload.params.endpoint;
      }
      if(r.kind==='exec'&&tid){
        attempts++;
        var res=(r.payload&&r.payload.result)||{};
        var md=res.metadata||{};
        if(md.target)target=md.target;
        if(!byTech[tid]){byTech[tid]={id:tid,attempts:[],layer:r.layer};order.push(tid);}
        byTech[tid].attempts.push(res);
      }
    });
    var techniques=order.map(function(tid){
      var T=byTech[tid], meta=CATALOG[tid]||{n:tid,layer:T.layer,owasp:"",atlas:"",sev:"info",ctrl:[]};
      var succeeded=T.attempts.some(function(a){return a.success===true;});
      var anyConf=T.attempts.some(function(a){return a.verdict==='confirmed';});
      var state=blocked[tid]?'blocked':(succeeded?(anyConf?'confirmed':'success'):'failed');
      // representative note
      var pick=T.attempts.filter(function(a){return a.success===true;})[0]||T.attempts[T.attempts.length-1]||{};
      var note=(pick.evidence||pick.response||'').replace(/\s+/g,' ').slice(0,180);
      var sevRaw=(pick.severity&&SEVMAP[pick.severity])||meta.sev||'info';
      var scorer=(pick.metadata&&pick.metadata.scorer)||'';
      var obj=(pick.metadata&&pick.metadata.objective_resolved)||'';
      return {layer:meta.layer,id:tid,what:meta.n,owasp:meta.owasp,atlas:meta.atlas,sev:sevRaw,state:state,scorer:scorer,note:note,attempts:T.attempts.length,resp:(pick.response||''),evid:(pick.evidence||''),obj:obj};
    });
    // blocked-only techniques (gate denied, never executed)
    Object.keys(blocked).forEach(function(tid){
      if(!byTech[tid]){var meta=CATALOG[tid]||{n:tid,layer:"application",owasp:"",atlas:"",sev:"info",ctrl:[]};
        techniques.push({layer:meta.layer,id:tid,what:meta.n,owasp:meta.owasp,atlas:meta.atlas,sev:meta.sev,state:'blocked',scorer:'',note:'Denied by the policy gate.',attempts:0});}
    });

    // Scope the report to a chosen attack package: keep only that package's techniques, so a different pick yields a different report.
    if(pkgTechs&&pkgTechs.length){
      var inPkg={};pkgTechs.forEach(function(id){inPkg[id]=1;});
      techniques=techniques.filter(function(t){return inPkg[t.id];});
      attempts=techniques.reduce(function(a,t){return a+(t.attempts||0);},0);
    }

    var M=compute(techniques);
    var targetName=target==='aigoat'?'AI Goat \u201cCracky\u201d':target;

    // verdict
    var verdict;
    if(M.criticals>0){verdict={color:"red",label:"Critical: confirmed data exfiltration",
      text:"A working path leaked data out of the application. <b>"+M.criticals+"</b> finding(s) reached Critical. This needs fixing before the application goes any further."};}
    else if(M.okN>0){verdict={color:"amb",label:"Weaknesses found",
      text:"<b>"+M.okN+"</b> of <b>"+M.fired+"</b> techniques got through. No Critical confirmed, but the surface needs hardening."};}
    else{verdict={color:"grn",label:"Target held: no successful attacks",
      text:"All <b>"+attempts+"</b> attempts across <b>"+M.fired+"</b> technique(s) were refused or failed. No data left the application and no guardrail was bypassed."};}

    // chain: succeeded steps if any, else the attempted path
    var succ=techniques.filter(function(t){return t.state==='confirmed'||t.state==='success';});
    var chainTechs=(succ.length?succ:techniques.filter(function(t){return t.state!=='blocked';})).slice();
    chainTechs.sort(function(a,b){return (LORDER[a.layer]-LORDER[b.layer])||a.id.localeCompare(b.id);});
    var steps=chainTechs.slice(0,6).map(function(t){return {layer:t.layer,id:t.id,title:t.what,note:t.note};});
    var outcome=succ.length
      ? "End result &nbsp;\u25b8&nbsp; <b>the attack chain completed</b> across "+succ.length+" step(s)."
      : "Outcome &nbsp;\u25b8&nbsp; <b>target held</b>. Every attempt was refused or failed; nothing left the app.";

    // facts
    var facts=[
      {k:"Target",v:targetName},
      {k:"Endpoint",v:endpoint||"n/a",mono:true},
      {k:"Techniques fired",v:String(M.fired)},
      {k:"Date",v:(firstTs||'').slice(0,10),mono:true}
    ];

    // remediations from fired techniques
    var seen={}, fixes=[];
    techniques.forEach(function(t){
      var rf=RFIX[t.id]; if(!rf||seen[rf.t])return; seen[rf.t]=true;
      var pri=(t.sev==='crit'||t.sev==='high')?'P1':'P2';
      var ctrl=(CATALOG[t.id]&&CATALOG[t.id].ctrl)||[];
      fixes.push({priority:pri,icon:rf.ic,title:rf.t,why:rf.w,controls:ctrl,_sev:t.sev});
    });
    fixes.push({priority:'P2',icon:'bell',title:"Watch for the whole chain in production",
      why:"Blocking one step is not enough. Alert on the recon \u25b8 leak \u25b8 poison \u25b8 exfiltrate pattern as a sequence.",controls:["Microsoft Defender for Cloud"]});
    fixes.sort(function(a,b){return (a.priority>b.priority?1:a.priority<b.priority?-1:0);});

    var remIntro=M.okN>0
      ? "Ordered by priority. P1 breaks the attack chain; P2 closes the remaining gaps."
      : "The target resisted this run. Keep these controls in place and verify them as the app evolves.";

    var VCMAP={red:'#e0484f',amb:'#cf9a55',grn:'#74b08e'};
    var VC=VCMAP[verdict.color]||'#9a9aa3';
    // OWASP coverage
    var OWASP=[['LLM01','Prompt Injection'],['LLM02','Sensitive Info Disclosure'],['LLM03','Supply Chain'],['LLM04','Data & Model Poisoning'],['LLM05','Improper Output Handling'],['LLM06','Excessive Agency'],['LLM07','System Prompt Leakage'],['LLM08','Vector & Embedding'],['LLM09','Misinformation'],['LLM10','Unbounded Consumption']];
    var firedOw={},succOw={};
    techniques.forEach(function(t){var ms=(t.owasp||'').match(/LLM\d+/g)||[];ms.forEach(function(o){firedOw[o]=true;if(t.state==='confirmed'||t.state==='success')succOw[o]=true;});});
    var coverage=OWASP.map(function(o){var st=succOw[o[0]]?'covered':(firedOw[o[0]]?'partial':'out');return {id:o[0],name:o[1],status:st};});
    // evidence: up to 2 most interesting techniques with a response
    var rank={confirmed:0,success:1,assessed:2,failed:3,blocked:4};
    var evidence=techniques.filter(function(t){return t.resp;}).sort(function(a,b){return (rank[a.state]-rank[b.state])||(b.sev==='crit')-(a.sev==='crit');}).slice(0,2).map(function(t){
      return {id:t.id,what:t.what,state:t.state,prompt:(t.obj||''),response:t.resp,evidence:t.evid};});
    // run trace timeline from rows
    var traceRows=[];
    rows.forEach(function(r){var ts=(r.timestamp||'').slice(11,19),tid=r.technique_id||'';
      if(r.kind==='dispatch'){var ev=r.payload&&r.payload.event;traceRows.push({t:ts,kind:'dispatch',msg:ev==='begin'?('dispatched '+((r.payload.techniques||[]).join(', '))):('merged '+(r.layer||'')+' scorecard')});}
      else if(r.kind==='gate'){var al=r.payload&&r.payload.decision&&r.payload.decision.allow;traceRows.push({t:ts,kind:'gate',msg:tid+(al?' permitted':' denied')});}
      else if(r.kind==='exec'){var res=(r.payload&&r.payload.result)||{};traceRows.push({t:ts,kind:'exec',msg:tid+' \u2192 '+(res.success?'objective met':'no hit')+(res.verdict?' ('+res.verdict+')':'')});}
    });
    return {
      meta:{brand:"TRIDENT",brandSub:"Security Assessment",runId:targetName.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+"-"+attempts},
      verdict:verdict, verdictColor:VC, coverage:coverage, evidence:evidence, trace:traceRows,
      facts:facts,
      techniques:techniques,
      chain:{steps:steps,outcome:outcome},
      fixes:{title:"What to fix first",intro:remIntro,rows:fixes,levels:{
        title:"Then prove the fixes work",
        intro:"Rerun this same campaign at each hardening level. The success rate should stay low or drop further.",
        rows:[
          {id:"L0",current:true,ex:"Baseline, with no extra defenses.",pj:"This run: <b>"+M.asr+"%</b> success, "+M.criticals+" critical"},
          {id:"L1",ex:"Input filtering and prompt hardening added.",pj:"Target: <b>lower</b>, evasion closed"},
          {id:"L2",ex:"Retrieval isolation, output encoding, access checks.",pj:"Target: <b>much lower</b>, chain broken"}
        ]}}
    };
  }

  var DEMO_TRACE=DEMO_TRACES[0]; var DEMO_I=0;
  var DEMO_FILTERED=false;
  function ensureDemoClean(){
    if(DEMO_FILTERED)return; DEMO_FILTERED=true;
    var keep=[];
    for(var i=0;i<DEMO_TRACES.length;i++){
      try{var rr=buildReport(DEMO_TRACES[i]),mm=compute(rr.techniques||[]);
        if(mm.criticals>0||mm.okN>0)keep.push(DEMO_TRACES[i]);}catch(e){keep.push(DEMO_TRACES[i]);}
    }
    if(keep.length){DEMO_TRACES=keep;DEMO_TRACE=DEMO_TRACES[0];}
  }
  var ACTIVE_TRACE=null;
  var R=null, M=null;
  var fact=function(k){var f=(R.facts||[]).filter(function(x){return x.k===k;})[0];return f?f.v:"";};

  function topbar(title,opts,leftNav){
    return '<div class="db-top"><div class="lg" role="button" tabindex="0" title="Back to home" onclick="window.TRIDENT_goHome&&window.TRIDENT_goHome()"><img src="'+MARK+'" alt="TRIDENT home"></div>'+
      '<span class="tag">'+title+'</span><span class="rid">'+(R.meta&&R.meta.runId||'')+'</span>'+
      (leftNav?'<div class="db-nav">'+leftNav+'</div>':'')+
      '<span class="sp"></span><div class="db-acts">'+opts+'</div></div>';
  }

  // ---------- EXECUTIVE EXPORT (manager-friendly, print to PDF) ----------
  function xrStrip(s){return String(s==null?'':s).replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();}

  function xrDonut(pct,color){
    var p=Math.max(0,Math.min(100,pct||0)),r=52,C=2*Math.PI*r,off=C*(1-p/100);
    return '<svg viewBox="0 0 150 150" width="150" height="150" style="margin:0 auto" role="img" aria-label="Attack success rate '+p+' percent">'+
      '<circle cx="75" cy="75" r="52" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="16"/>'+
      '<circle cx="75" cy="75" r="52" fill="none" stroke="'+color+'" stroke-width="16" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 75 75)"/>'+
      '<text x="75" y="72" text-anchor="middle" font-size="30" font-weight="700" fill="#15151a">'+p+'%</text>'+
      '<text x="75" y="92" text-anchor="middle" font-size="11" fill="#6b6b73">success</text></svg>';
  }
  function xrSevBars(){
    var max=Math.max(1,SEV.reduce(function(m,s){return Math.max(m,M.sev[s.k]||0);},0));
    var W=340,H=160,n=SEV.length,bw=34,gap=(W-n*bw)/(n+1),base=H-26;
    var bars=SEV.map(function(s,i){
      var val=M.sev[s.k]||0,h=Math.round(val/max*(base-16)),x=gap+i*(bw+gap),y=base-h;
      return '<rect x="'+x.toFixed(1)+'" y="'+y+'" width="'+bw+'" height="'+Math.max(h,1)+'" rx="3" fill="'+s.c+'"/>'+
        '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-6)+'" text-anchor="middle" font-size="12" font-weight="700" fill="#15151a">'+val+'</text>'+
        '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(base+16)+'" text-anchor="middle" font-size="10" fill="#6b6b73">'+s.l+'</text>';
    }).join('');
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="160"><line x1="0" y1="'+base+'" x2="'+W+'" y2="'+base+'" stroke="rgba(0,0,0,.14)"/>'+bars+'</svg>';
  }
  function xrLayerBars(){
    if(!M.layers.length)return '<div class="xr-note">No layer activity recorded.</div>';
    var W=360,rowH=32,H=M.layers.length*rowH+6,labelW=96,barMax=W-labelW-46;
    var rows=M.layers.map(function(l,i){
      var y=i*rowH+6,w=Math.round((l.pct||0)/100*barMax);
      return '<text x="0" y="'+(y+15)+'" font-size="12.5" fill="#15151a" font-weight="600">'+l.n+'</text>'+
        '<rect x="'+labelW+'" y="'+(y+4)+'" width="'+barMax+'" height="14" rx="7" fill="rgba(0,0,0,.1)"/>'+
        '<rect x="'+labelW+'" y="'+(y+4)+'" width="'+Math.max(w,0)+'" height="14" rx="7" fill="'+l.c+'"/>'+
        '<text x="'+(labelW+barMax+6)+'" y="'+(y+15)+'" font-size="12" font-weight="700" fill="'+l.c+'">'+(l.pct||0)+'%</text>';
    }).join('');
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">'+rows+'</svg>';
  }

  function xrLayerDonut(){
    var data=M.layers.map(function(l){return {n:l.n,c:l.c,v:l.fired};}).filter(function(d){return d.v>0;});
    var total=data.reduce(function(a,d){return a+d.v;},0);
    if(!total){return '<div class="xr-note">No techniques recorded.</div>';}
    var r=54,C=2*Math.PI*r,acc=0;
    var segs=data.map(function(d){
      var len=C*(d.v/total),off=-acc;acc+=len;
      return '<circle cx="75" cy="75" r="'+r+'" fill="none" stroke="'+d.c+'" stroke-width="20" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+off.toFixed(2)+'" transform="rotate(-90 75 75)"/>';
    }).join('');
    var svg='<svg viewBox="0 0 150 150" width="140" height="140">'+segs+
      '<text x="75" y="70" text-anchor="middle" font-size="26" font-weight="800" fill="#15151a">'+total+'</text>'+
      '<text x="75" y="88" text-anchor="middle" font-size="10" fill="#6b6b73">techniques</text></svg>';
    var legend=data.map(function(d){var p=Math.round(d.v/total*100);
      return '<div class="xr-leg"><span class="xr-dot" style="background:'+d.c+'"></span><b>'+esc2(d.n)+'</b><span class="xr-legv">'+d.v+' \u00b7 '+p+'%</span></div>';}).join('');
    return '<div class="xr-donutwrap">'+svg+'<div class="xr-leglist">'+legend+'</div></div>';
  }

  function xrHeatmap(){
    var sevOrder=['info','low','med','high','crit'], stOrder=['blocked','failed','assessed','success','confirmed'];
    var grid={};
    (R.techniques||[]).forEach(function(t){
      var si=sevOrder.indexOf(t.sev),ki=stOrder.indexOf(t.state);

    if(!api)return;

  function groundCite(c,n){

  // strip a trailing "References:/Sources:" block some deployments append inline, so the

  function groundClean(s){

    if(!ans&&!czu.length)return '';

  function mdInline(s){
    s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/__([^_]+)__/g,'<b>$1</b>');
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,function(m,t,u){return '<a href="'+u.replace(/"/g,'%22')+'" target="_blank" rel="noopener noreferrer">'+t+'</a>';});
    return s;
  }
  function mdLite(raw){
    var lines=esc2(String(raw||'')).split(/\r?\n/);
    var out=[],lt=null;
    function close(){if(lt){out.push('</'+lt+'>');lt=null;}}
    for(var i=0;i<lines.length;i++){
      var t=lines[i].trim();
      if(!t){close();continue;}
      var h=/^(#{1,6})\s+(.*)$/.exec(t);
      if(h){close();out.push('<div class="xr-gh">'+mdInline(h[2])+'</div>');continue;}
      var u=/^[-*\u2022]\s+(.*)$/.exec(t);
      if(u){if(lt!=='ul'){close();out.push('<ul>');lt='ul';}out.push('<li>'+mdInline(u[1])+'</li>');continue;}
      var o=/^(\d+)[.)]\s+(.*)$/.exec(t);
      if(o){if(lt!=='ol'){close();out.push('<ol>');lt='ol';}out.push('<li value="'+o[1]+'">'+mdInline(o[2])+'</li>');continue;}
      close();out.push('<p>'+mdInline(t)+'</p>');
    }
    close();
    return out.join('')||('<p>'+esc2(String(raw||''))+'</p>');
  }

  // Compute the best column count for a given chain-flow element and apply it
  function reshapeFlow(flow){
    if(!flow)return;
    var n=flow.querySelectorAll('.cstep').length;if(!n)return;
    var w=flow.clientWidth||flow.offsetWidth||0;if(!w){requestAnimationFrame(function(){reshapeFlow(flow);});return;}
    var full=flow.classList.contains('cf-flow');
    var minW=full?280:132; // min comfortable width per tile
    var cols=Math.max(1,Math.min(n,Math.floor((w+8)/(minW+8))));
    // balance rows so the last row isn't left with a single orphan
    var rows=Math.ceil(n/cols);cols=Math.ceil(n/rows);
    flow.style.setProperty('--ccols',cols);
    flow.classList.toggle('single',cols>=n);
    flow.classList.toggle('compact',!full&&rows>=2);
    flow.classList.toggle('compact2',!full&&rows>=3);
  }
  // Dynamically reshape the dashboard kill-chain into the best grid for the current width / step count
  function reshapeChain(){
    var d=document.getElementById('dboard');if(!d)return;

  }

  function animateDash(){
    var d=document.getElementById('dboard');
    var panels=d.querySelectorAll('.panel,.kpi');
    panels.forEach(function(p,i){p.style.transitionDelay=(i*60)+'ms';});
    // rAF is paused while the tab is backgrounded; a timer fallback guarantees the
    // panels reveal (they could otherwise stay at opacity:0 until a page refresh).
    var _revealDash=function(){d.classList.add('show');};
    requestAnimationFrame(_revealDash);
    setTimeout(_revealDash,300);
    // gauge fill + radar sweep (one shot)
    var deg=M.asr/100*360, gv=document.getElementById('gv'), g=d.querySelector('.gauge'), sw=d.querySelector('.sweep');
    if(sw){sw.style.animation='sweep 1.3s cubic-bezier(.2,.7,.2,1) 1';}
    var t0=null,dur=1300;
    function step(ts){if(!t0)t0=ts;var p=Math.min(1,(ts-t0)/dur);var e=1-Math.pow(1-p,3);
      g.style.setProperty('--deg',(deg*e)+'deg');gv.textContent=Math.round(M.asr*e)+'%';
      if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
    setTimeout(function(){
      d.querySelectorAll('.lbar i').forEach(function(i){i.style.width=i.getAttribute('data-pct')+'%';});
      d.querySelectorAll('.sev .bar').forEach(function(b){b.style.height=b.getAttribute('data-h')+'%';});
    },300);
    // per-layer attacks reveal (staggered)
    d.querySelectorAll('.latk').forEach(function(a,i){a.style.transitionDelay=(i*40)+'ms';setTimeout(function(){a.classList.add('in');},350);});
    // OWASP heatmap reveal
    d.querySelectorAll('.cov').forEach(function(c,i){c.style.transitionDelay=(i*45)+'ms';setTimeout(function(){c.classList.add('in');},700);});
    // kpi count
    d.querySelectorAll('.kpi b').forEach(function(b){
      var to=parseFloat(b.getAttribute('data-count'))||0, suf=b.getAttribute('data-suf')||'';
      var s0=null;function cs(ts){if(!s0)s0=ts;var p=Math.min(1,(ts-s0)/1100);var e=1-Math.pow(1-p,3);
        b.textContent=Math.round(to*e)+suf;if(p<1)requestAnimationFrame(cs);}
      setTimeout(function(){requestAnimationFrame(cs);},250);
    });
  }

  // ---------- ATTACK CHAIN TIMELINE (forward/back replay) ----------
  function setupTimeline(){
    var steps=(R.chain&&R.chain.steps||[]);
    var track=document.getElementById('tl-track'); if(!track)return;
    var stepEls=[].slice.call(track.querySelectorAll('.tl-step'));
    var connEls=[].slice.call(track.querySelectorAll('.tl-conn'));
    var posEl=document.getElementById('tl-pos'), detail=document.getElementById('tl-detail');
    var prev=document.getElementById('tl-prev'), next=document.getElementById('tl-next'), play=document.getElementById('tl-play');
    if(!steps.length){if(detail)detail.style.display='none';[prev,next,play].forEach(function(b){if(b)b.disabled=true;});return;}
    var pos=steps.length-1, timer=null;
    function render(){
      stepEls.forEach(function(n,i){n.classList.toggle('on',i<=pos);n.classList.toggle('cur',i===pos);});
      connEls.forEach(function(c){var ci=parseInt(c.getAttribute('data-i'),10);c.classList.toggle('on',ci<=pos);});
      if(posEl)posEl.textContent=(pos+1);
      var s=steps[pos]||{};
      if(detail)detail.innerHTML='<b>'+esc2((s.id||'')+(s.layer?(' \u00b7 '+s.layer):''))+'</b> '+esc2(s.title||'')+(s.note?' \u2014 '+esc2(xrStrip(s.note)):'');
      var cur=stepEls[pos];if(cur&&cur.scrollIntoView){try{cur.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});}catch(e){}}
    }
    function stop(){if(timer){clearInterval(timer);timer=null;}if(play){play.classList.remove('on');play.innerHTML='\u25b6';}}
    function go(d){stop();pos=Math.max(0,Math.min(steps.length-1,pos+d));render();}
    if(prev)prev.onclick=function(){go(-1);};
    if(next)next.onclick=function(){go(1);};
    if(play)play.onclick=function(){
      if(timer){stop();return;}
      if(pos>=steps.length-1)pos=0;
      play.classList.add('on');play.innerHTML='\u275a\u275a';render();
      timer=setInterval(function(){if(pos>=steps.length-1){stop();return;}pos++;render();},850);
    };
    stepEls.forEach(function(n,i){n.onclick=function(){stop();pos=i;render();};});
    render();
  }

        '<button id="ws-go" class="db-btn red">Search</button>'+

      '<div id="ws-out" class="ws-out"></div></div>';
    var q=document.getElementById('ws-q');
    function run(){
      var out=document.getElementById('ws-out');

      var ctx=(document.getElementById('ws-ctx')||{}).value||'medium';
      out.innerHTML='<div class="ws-load"><span class="ws-spin"></span> Grounding \u201c'+esc2(query)+'\u201d against the public web\u2026</div>';
      window.TRIDENT_API.websearch(query,ctx).then(function(res){renderWebSearch(res);}).catch(function(e){
        var o=document.getElementById('ws-out'); if(o)o.innerHTML='<div class="ws-state err"><b>Web search failed</b><span>'+esc2(String((e&&e.message)||e))+'</span></div>';
      });

      c.onclick=function(){q.value=c.textContent;run();};

    else if(seedQuery){run();}

  function renderWebSearch(res){
    var out=document.getElementById('ws-out'); if(!out)return;
    res=res||{};
    if(res.status==='unavailable'){
      out.innerHTML='<div class="ws-state warn"><b>Web grounding not configured</b>'+
        '<span>'+esc2(res.reason||'Set FOUNDRY_PROJECT_ENDPOINT to enable the Foundry web_search tool.')+'</span>'+
        '<code>FOUNDRY_PROJECT_ENDPOINT=https://&lt;resource&gt;.ai.azure.com/api/projects/&lt;project&gt;</code></div>';
      return;
    }
    if(res.status!=='ok'){
      out.innerHTML='<div class="ws-state err"><b>Web search error</b><span>'+esc2(res.reason||res.error||'unknown error')+'</span></div>';
      return;
    }
    var cz=(res.citations||[]);
    var cites=cz.map(function(c,i){
      var url=c.url||''; var title=(c.title||url)||'source';
      return '<a class="ws-cite" href="'+esc2(url)+'" target="_blank" rel="noopener noreferrer">'+

    }).join('') || '<div class="rm-sub" style="margin:0">No source citations were returned for this query.</div>';
    out.innerHTML=
      '<div class="ws-ans"><div class="ws-ah">Grounded answer</div><div class="ws-atext">'+esc2(res.answer||'(the tool returned no answer text)')+'</div></div>'+
      '<div class="ws-cites"><div class="ws-ch">Sources \u00b7 '+cz.length+'</div>'+cites+'</div>';
  }

        var card=document.createElement('div');card.className='ac-opt'+(best?' best':'');
        var oc=PKG_PALETTE[idx%PKG_PALETTE.length];
        card.style.setProperty('--pc',oc.c);card.style.setProperty('--pcs',oc.s);card.style.setProperty('--pcm',oc.m);card.style.setProperty('--pcg',oc.g);
        card.innerHTML=
          '<div class="op-head"><div class="op-rank">'+String(idx+1)+'</div><div class="op-main">'+
            '<div class="op-kick">'+esc2(p.id)+' \u00b7 '+esc2(p.axis)+'</div>'+
            '<div class="op-name">'+esc2(p.name)+'</div>'+
            '<div class="op-desc">'+esc2(item.rationale||p.description)+'</div>'+
            '<div class="op-meta">'+tagHtml+'</div></div></div>'+
          '<div class="pk-detail"><div class="pk-detail-in">'+techRows+'</div></div>'+
          '<div class="op-acts">'+
            '<button class="op-btn" data-act="toggle">Techniques</button>'+
            '<button class="op-btn'+(best?' primary':'')+'" data-act="go">'+(best?'Launch this package':'Run this package')+' '+ARROW+'</button>'+
          '</div>';
        var det=card.querySelector('.pk-detail'),tg=card.querySelector('[data-act="toggle"]');
        tg.onclick=function(){det.classList.toggle('open');
          tg.textContent=det.classList.contains('open')?'Hide':'Techniques';
          if(det.classList.contains('open')){var acts=card.querySelector('.op-acts');if(acts)setTimeout(function(){acts.scrollIntoView({block:'nearest',behavior:'smooth'});},480);}else{down();}};
        Array.prototype.forEach.call(card.querySelectorAll('.pk-tx'),function(btn){
          btn.onclick=function(e){e.stopPropagation();var wp=btn.closest('.pk-tech-wrap');if(!wp)return;
            var bd=wp.querySelector('.pk-tx-body');var op=btn.classList.toggle('open');if(bd)bd.classList.toggle('open',op);};
        });
        card.querySelector('[data-act="go"]').onclick=function(){document.body.classList.remove('pkg-open');PLAN=null;setHint(false);if(onSelect)onSelect(p);};
        card.addEventListener('click',function(){wrap.querySelectorAll('.ac-opt').forEach(function(x){x.classList.remove('sel');});card.classList.add('sel');});
        wrap.appendChild(card);
      });
      box.appendChild(wrap);down();
      document.body.classList.add('pkg-open');
    }
  }

  window.TRIDENT_launch=function(prompt,trace,instant,pkgTechs){
    var T;
    if(typeof trace==='string'&&/^__DEMO:(\d+)__$/.test(trace)){T=DEMO_TRACES[(+RegExp.$1)%DEMO_TRACES.length];}
    else if(trace==='__DEMO__'){T=DEMO_TRACES[0];}
    else{T=trace||ACTIVE_TRACE||DEMO_TRACE;}
    R=buildReport(T,pkgTechs); M=compute(R.techniques||[]); window.__TVC=R.verdictColor;
    var d=document.getElementById('dboard');
    if(instant){hide('remed');hide('scan');d.classList.remove('show');buildDash();show('dboard');animateDash();return;}
    // Planning agent: simulate research + recommend an attack package, then run on confirm.
    runAgentChat(prompt,function(selPkg){
      var capturePlan=function(){var plan='',rows=document.querySelectorAll('#messages .row.ac-plan');
        for(var pi=0;pi<rows.length;pi++)plan+=rows[pi].outerHTML;return plan;};
      var render=function(Tuse,scopeTechs,realTrace){
        // the chosen package scopes the report; the live backend trace is authoritative when present
        R=buildReport(Tuse,scopeTechs);M=compute(R.techniques||[]);window.__TVC=R.verdictColor;
        if(window.__TRIDENT_commitTrace)window.__TRIDENT_commitTrace(realTrace||trace,capturePlan());
        hide('scan');d.classList.remove('show');buildDash();show('dboard');animateDash();
      };
      // Confirmed package → run the REAL campaign for it on the backend (demo fallback).
      if(window.__TRIDENT_fetchTrace&&selPkg&&selPkg.id){
        window.__TRIDENT_fetchTrace(prompt,'attack',selPkg.id).then(function(res){
          if(res&&res.trace){ACTIVE_TRACE=res.trace;render(res.trace,null,res.trace);}
          else render(T,(selPkg&&selPkg.techniques)||null,null);
        });
      } else render(T,(selPkg&&selPkg.techniques)||null,null);
    });
  };
  if(window.__TRIDENT_refreshChat)window.__TRIDENT_refreshChat();
})();
</script>

<script>
/* ============================================================
   TRIDENT backend bridge — connects this UI to the offline engine
   (trident-main/src/web/server.py). When the backend is unreachable it
   transparently falls back to the embedded demo traces, so this file still
   works as a standalone static page.
   ============================================================ */
(function(){
  "use strict";
  // Same-origin when served by the bridge; otherwise (file://) hit the default port.
  var BASE=(location.protocol==='http:'||location.protocol==='https:')?'':'http://127.0.0.1:8765';
  function api(path,opts){return fetch(BASE+path,opts).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}

  window.TRIDENT_API={
    base:BASE,
    health:function(){return api('/api/health');},
    packages:function(){return api('/api/packages');},
    techniques:function(){return api('/api/techniques');},
    campaign:function(prompt,mode,pkgId){
      return api('/api/campaign',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:prompt||'',mode:mode||'attack',package:pkgId||null})});
    },
    plan:function(history,mode){
      return api('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({history:history||[],mode:mode||'attack'})});
    },
    websearch:function(query,ctx){
      return api('/api/websearch',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({query:query||'',context_size:ctx||'medium'})});
    }
  };

  window.__TRIDENT_BACKEND=false;
  window.__TRIDENT_lastResult=null;

  // Run a REAL campaign on the backend and publish its trace via TRIDENT.setTrace.
  // Resolves to the campaign result, or null on any failure (caller uses demo data).
  window.__TRIDENT_fetchTrace=function(prompt,mode,pkgId){
    if(!window.__TRIDENT_BACKEND)return Promise.resolve(null);
    return window.TRIDENT_API.campaign(prompt,mode,pkgId).then(function(res){
      if(res&&res.trace){window.__TRIDENT_lastResult=res;if(window.TRIDENT&&window.TRIDENT.setTrace)window.TRIDENT.setTrace(res.trace);return res;}
      return null;
    }).catch(function(e){console.warn('[TRIDENT] backend campaign failed:',e);return null;});
  };

  // ---- backend status chip + connection popover (top-right of the topbar) ----
  var _connHealth=null,_connMs=null,_connChecked=null;
  var _connURL=(BASE||location.origin||'http://127.0.0.1:8765');

  var _cstyle=document.createElement('style');
  _cstyle.textContent=
    '#trident-conn-pop{position:fixed;z-index:10000;width:300px;max-width:calc(100vw - 24px);'+
      'background:rgba(20,20,24,.97);border:1px solid rgba(255,255,255,.12);border-radius:14px;'+
      'box-shadow:0 16px 44px rgba(0,0,0,.5);padding:14px;color:#cdd2da;'+
      'font:500 12.5px/1.45 var(--font,sans-serif);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}'+
    '#trident-conn-pop .cp-head{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:#fff;margin-bottom:11px}'+
    '#trident-conn-pop .cp-dot{width:9px;height:9px;border-radius:50%;flex:none}'+
    '#trident-conn-pop .cp-rows{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}'+
    '#trident-conn-pop .cp-row{display:flex;gap:10px;align-items:baseline}'+
    '#trident-conn-pop .cp-row>span{flex:none;width:86px;color:#8a8f99;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}'+
    '#trident-conn-pop .cp-row>b{flex:1;color:#e7eaf0;font-weight:600;word-break:break-word}'+
    '#trident-conn-pop .cp-chip{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);margin:0 4px 4px 0;color:#bfc5cf;font-family:ui-monospace,Consolas,monospace}'+
    '#trident-conn-pop .cp-on{color:#5fc08e}#trident-conn-pop .cp-off{color:#8a8f99}'+
    '#trident-conn-pop .cp-test{width:100%;height:34px;border:none;border-radius:9px;background:#e11d2a;color:#fff;font:700 12px/1 var(--font,sans-serif);text-transform:uppercase;letter-spacing:.05em;cursor:pointer}'+
    '#trident-conn-pop .cp-test:disabled{opacity:.6;cursor:default}'+
    '#trident-conn-pop .cp-checked{margin-top:8px;font-size:11px;color:#7d828c;text-align:center}'+
    '#trident-backend-badge{cursor:pointer}#trident-backend-badge:hover{border-color:rgba(255,255,255,.22)}';
  document.head.appendChild(_cstyle);

  var badge=document.createElement('button');
  badge.id='trident-backend-badge';badge.type='button';
  badge.style.cssText='display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;margin-left:6px;'+
    'border-radius:999px;font:600 11px/1 var(--font,sans-serif);letter-spacing:.04em;text-transform:uppercase;'+
    'color:var(--secondary,#a7a7ad);background:var(--surface-2,#212125);border:1px solid var(--border,rgba(255,255,255,.10));'+
    'white-space:nowrap;flex:none;transition:.2s';
  badge.innerHTML='<span id="tbb-dot" style="width:7px;height:7px;border-radius:50%;background:#caa53a;box-shadow:0 0 7px #caa53a;flex:none"></span>'+
    '<span id="tbb-txt">connecting\u2026</span>'+
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="opacity:.6"><path d="M6 9l6 6 6-6"/></svg>';
  var _topbar=document.querySelector('.main .topbar');
  if(_topbar)_topbar.appendChild(badge);else document.body.appendChild(badge);
  function setBadge(txt,color){var d=document.getElementById('tbb-dot'),t=document.getElementById('tbb-txt');
    if(d){d.style.background=color;d.style.boxShadow='0 0 7px '+color;}if(t)t.textContent=txt;}

  var pop=document.createElement('div');pop.id='trident-conn-pop';pop.style.display='none';
  pop.innerHTML=
    '<div class="cp-head"><span class="cp-dot" id="cp-dot"></span><span id="cp-title">Checking\u2026</span></div>'+
    '<div class="cp-rows">'+
      '<div class="cp-row"><span>URL</span><b id="cp-url"></b></div>'+
      '<div class="cp-row"><span>Engine</span><b id="cp-engine"></b></div>'+
      '<div class="cp-row"><span>Catalog</span><b id="cp-catalog"></b></div>'+
      '<div class="cp-row"><span>Target</span><b id="cp-target"></b></div>'+
      '<div class="cp-row"><span>Capabilities</span><b id="cp-caps"></b></div>'+
      '<div class="cp-row"><span>Endpoints</span><b id="cp-endpoints"></b></div>'+
      '<div class="cp-row"><span>Latency</span><b id="cp-latency"></b></div>'+
    '</div>'+
    '<button class="cp-test" id="cp-test">Test connection</button>'+
    '<div class="cp-checked" id="cp-checked"></div>';
  document.body.appendChild(pop);

  function _q(id){return document.getElementById(id);}
  function _cap(on){return on?'<span class="cp-on">on</span>':'<span class="cp-off">off</span>';}
  function renderPop(){
    var ok=window.__TRIDENT_BACKEND,h=_connHealth||{};
    _q('cp-dot').style.background=ok?'#5fc08e':'#c25a5a';
    _q('cp-dot').style.boxShadow='0 0 8px '+(ok?'#5fc08e':'#c25a5a');
    _q('cp-title').textContent=ok?'Connected':'Not connected';
    _q('cp-url').textContent=_connURL;
    _q('cp-engine').textContent=ok?(h.engine||'\u2014'):'\u2014';
    _q('cp-catalog').textContent=ok?((h.techniques||0)+' techniques \u00b7 '+(h.packages||0)+' packages'):'\u2014';
    _q('cp-target').textContent=ok?((h.targets&&h.targets.join(', '))||'echo'):'\u2014';
    _q('cp-caps').innerHTML=ok?('foundry '+_cap(h.foundry_configured)+' \u00b7 pyrit '+_cap(h.pyrit_installed)+' \u00b7 sdk '+_cap(h.sdk_installed)):'\u2014';
    _q('cp-endpoints').innerHTML=ok?['/api/health','/api/packages','/api/plan','/api/campaign'].map(function(e){return '<span class="cp-chip">'+e+'</span>';}).join(''):'\u2014';
    _q('cp-latency').textContent=(_connMs!=null)?(_connMs+' ms'):(ok?'\u2014':'unreachable');
    _q('cp-checked').textContent=_connChecked?('last checked '+_connChecked.toLocaleTimeString()):'';
  }
  function positionPop(){
    var r=badge.getBoundingClientRect();
    pop.style.top=(r.bottom+8)+'px';
    pop.style.right=Math.max(12,window.innerWidth-r.right)+'px';pop.style.left='auto';
  }
  function openPop(){renderPop();pop.style.display='block';positionPop();}
  function closePop(){pop.style.display='none';}
  badge.addEventListener('click',function(e){e.stopPropagation();if(pop.style.display==='none')openPop();else closePop();});
  document.addEventListener('click',function(e){if(pop.style.display==='block'&&!pop.contains(e.target)&&!badge.contains(e.target))closePop();});
  window.addEventListener('resize',function(){if(pop.style.display==='block')positionPop();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePop();});

  function checkConnection(){
    setBadge('checking\u2026','#caa53a');
    var t0=(window.performance&&performance.now)?performance.now():Date.now();
    return window.TRIDENT_API.health().then(function(h){
      _connMs=Math.round(((window.performance&&performance.now)?performance.now():Date.now())-t0);
      _connHealth=h;window.__TRIDENT_BACKEND=true;window.__TRIDENT_health=h;_connChecked=new Date();
      setBadge('Backend live \u00b7 '+h.techniques+' techniques','#3fae7a');
      renderPop();return true;
    }).catch(function(){
      _connMs=null;window.__TRIDENT_BACKEND=false;_connChecked=new Date();
      setBadge('Backend offline \u00b7 demo data','#c25a5a');
      renderPop();return false;
    });
  }
  _q('cp-test').addEventListener('click',function(){var b=this;b.disabled=true;b.textContent='Testing\u2026';
    checkConnection().then(function(){b.disabled=false;b.textContent='Test connection';});});

  checkConnection();
  if(window.TRIDENT_API.techniques)window.TRIDENT_API.techniques().then(function(d){
    if(window.__TRIDENT_applyTechniques)window.__TRIDENT_applyTechniques(d.techniques||d);
  }).catch(function(){});
  if(window.TRIDENT_API.packages)window.TRIDENT_API.packages().then(function(d){
    if(window.__TRIDENT_applyPackages)window.__TRIDENT_applyPackages(d.packages||d);
  }).catch(function(){});
})();
</script>
